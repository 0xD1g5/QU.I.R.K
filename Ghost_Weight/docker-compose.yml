version: "3.8"

# ─── Operation Ghost Wait — Base Stack ──────────────────────────────────────
# QL AI Services + Orchestrator UI + Enterprise Simulation
# SIEM stack is in docker-compose.siem.yml — run both together:
#   docker compose -f docker-compose.yml -f docker-compose.siem.yml up -d
# ────────────────────────────────────────────────────────────────────────────

networks:
  qfl-range:
    driver: bridge

volumes:
  docuintel-vectorstore:
    driver: local
  fraudsentinel-memory:
    driver: local

services:

  # ── QL-Assist — AI Analyst Assistant (Attack Surface: Direct Prompt Injection) ──
  ql-assist:
    build:
      context: ./services/ql-assist
      dockerfile: Dockerfile
    container_name: ql-assist
    ports:
      - "8001:8001"
    networks:
      - qfl-range
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - SIEM_URL=http://opensearch:9200
      - SIEM_INDEX=${SIEM_INDEX:-qfl-events}
      - SERVICE_NAME=ql-assist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── QL-DocuIntel — Document Analysis Pipeline (Attack Surface: Indirect Injection) ──
  ql-docuintel:
    build:
      context: ./services/ql-docuintel
      dockerfile: Dockerfile
    container_name: ql-docuintel
    ports:
      - "8002:8002"
    networks:
      - qfl-range
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - SIEM_URL=http://opensearch:9200
      - SIEM_INDEX=${SIEM_INDEX:-qfl-events}
      - SERVICE_NAME=ql-docuintel
      - FRAUDSENTINEL_URL=http://ql-fraudsentinel:8003
    volumes:
      - docuintel-vectorstore:/app/data/vectorstore
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── QL-FraudSentinel — Fraud Detection & Scoring (Attack Surface: Memory Poisoning) ──
  ql-fraudsentinel:
    build:
      context: ./services/ql-fraudsentinel
      dockerfile: Dockerfile
    container_name: ql-fraudsentinel
    ports:
      - "8003:8003"
    networks:
      - qfl-range
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - SIEM_URL=http://opensearch:9200
      - SIEM_INDEX=${SIEM_INDEX:-qfl-events}
      - SERVICE_NAME=ql-fraudsentinel
    volumes:
      - fraudsentinel-memory:/app/data/memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── QFL Orchestrator — Presenter Intelligence Briefing UI ──
  qfl-orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: qfl-orchestrator
    ports:
      - "3000:3000"
    networks:
      - qfl-range
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SIEM_URL=http://opensearch:9200
      - SIEM_UI_URL=http://opensearch-dashboards:5601
      - SIEM_INDEX=${SIEM_INDEX:-qfl-events}
      - QL_ASSIST_URL=http://ql-assist:8001
      - QL_DOCUINTEL_URL=http://ql-docuintel:8002
      - QL_FRAUDSENTINEL_URL=http://ql-fraudsentinel:8003
    depends_on:
      ql-assist:
        condition: service_healthy
      ql-docuintel:
        condition: service_healthy
      ql-fraudsentinel:
        condition: service_healthy
    restart: unless-stopped

  # ── QFL Intranet — Internal Portal (Recon Target) ──
  qfl-intranet:
    image: nginx:alpine
    container_name: qfl-intranet
    ports:
      - "8080:80"
    networks:
      - qfl-range
    volumes:
      - ./enterprise/intranet:/usr/share/nginx/html:ro
      - ./enterprise/intranet/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── QFL Mail Server — SMTP/IMAP for phishing simulation ──
  # mailserver: ARM64-native via ghcr.io/docker-mailserver/docker-mailserver
  qfl-mailserver:
    image: docker.io/mailserver/docker-mailserver:latest
    container_name: qfl-mailserver
    hostname: mail.quantumledger.com
    ports:
      - "1025:25"    # SMTP
      - "1143:143"   # IMAP
    networks:
      - qfl-range
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
      - ENABLE_POSTGREY=0
      - ENABLE_SASLAUTHD=0
      - ONE_DIR=1
      - DMS_DEBUG=0
      - SSL_TYPE=none
      - POSTFIX_INET_PROTOCOLS=ipv4
    volumes:
      - ./enterprise/mail/config:/tmp/docker-mailserver:ro
      - ./enterprise/mail/data:/var/mail
      - ./enterprise/mail/state:/var/mail-state
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  # ── QFL Workstation — Ubuntu VNC Desktop (Analyst simulation) ──
  # ARM64-compatible: linuxserver/webtop uses multi-arch manifests
  qfl-workstation:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: qfl-workstation
    ports:
      - "5901:3000"   # VNC via noVNC HTTP (mapped to 5901 on host)
    networks:
      - qfl-range
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    shm_size: "512mb"
    restart: unless-stopped
