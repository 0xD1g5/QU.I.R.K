# OQS-nginx lab profile — pinned X25519MLKEM768 hybrid TLS configuration.
# Phase 90 / PQC-01 (v5.0). Digest-pinned image:
#   openquantumsafe/nginx@sha256:6ca18ac692f347ea9d4c3fdab4231189f2146570cd03c4d8fb486bba208ef870
#
# Key decisions (90-CONTEXT.md D-02):
#   - Pin ssl_ecdh_curve X25519MLKEM768 for deterministic hybrid-group negotiation.
#   - TLS 1.3 only (ssl_protocols TLSv1.3).
#   - Reuse the image's bundled ML-DSA-65 cert at /opt/nginx/pki/.
#   - Listen on port 443 so the docker-compose ports mapping 39444:443 works.

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       ../conf/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       0.0.0.0:443 ssl;
        server_name  oqs-nginx;

        access_log  /opt/nginx/logs/access.log;
        error_log   /opt/nginx/logs/error.log;

        ssl_certificate      /opt/nginx/pki/server.crt;
        ssl_certificate_key  /opt/nginx/pki/server.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        # TLS 1.3 only — required for hybrid KEM groups.
        ssl_protocols TLSv1.3;

        # Pin the hybrid PQC group for deterministic negotiation (D-02).
        # X25519MLKEM768 = NIST-standardized ML-KEM (formerly Kyber) + X25519, NamedGroup 4588.
        ssl_ecdh_curve X25519MLKEM768;

        location / {
            root   html;
            index  index.html index.htm;
        }
    }
}
