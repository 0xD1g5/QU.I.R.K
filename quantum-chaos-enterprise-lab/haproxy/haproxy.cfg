global
  maxconn 2048

defaults
  mode tcp
  timeout connect 5s
  timeout client  30s
  timeout server  30s

frontend fe_tls_slow
  bind *:12443
  default_backend be_tls

backend be_tls
  # Add artificial delay (simple approach via timeout tuning; true delay would need tc/netem)
  server s1 tls-modern:443 check

