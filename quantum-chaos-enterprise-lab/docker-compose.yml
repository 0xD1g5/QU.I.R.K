services:
  # =========================
  # MODERN TLS (TLS 1.3)
  # =========================
  tls-modern:
    image: nginx:stable
    volumes:
      - ./nginx/modern/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "443:443"

  # =========================
  # LEGACY TLS (TLS 1.0/1.1 enabled + weak-ish ciphers)
  # Note: Modern OpenSSL builds may refuse enabling truly ancient ciphers.
  # Still useful for "legacy protocol enabled" + TLS 1.2 fallback behavior.
  # =========================
  tls-legacy:
    image: nginx:stable
    volumes:
      - ./nginx/legacy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "8443:443"

  # =========================
  # EXPIRED CERT TLS
  # =========================
  tls-expired:
    image: nginx:stable
    volumes:
      - ./nginx/expired/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "9443:443"

  # =========================
  # SELFSIGNED CERT TLS
  # =========================
  tls-selfsigned:
    image: nginx:stable
    volumes:
      - ./nginx/selfsigned/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "10443:443"

  # =========================
  # mTLS REQUIRED (forces handshake/client cert failure)
  # Great for testing "handshake failure" vs "cert issues"
  # =========================
  tls-mtls-required:
    image: nginx:stable
    volumes:
      - ./nginx/mtls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "11443:443"

  # =========================
  # PLAINTEXT HTTP ON A "TLS-LIKE" PORT (wrong version number)
  # =========================
  http-on-8444:
    image: nginx:stable
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "8444:80"

  # =========================
  # HTTP ONLY LEGACY APP
  # =========================
  legacy-http:
    image: httpd:2.4
    ports:
      - "8000:80"

  # =========================
  # SSH ON NON-STANDARD PORT
  # =========================
  ssh-alt:
    image: lscr.io/linuxserver/openssh-server
    environment:
      - PASSWORD_ACCESS=true
      - USER_NAME=test
      - USER_PASSWORD=test
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "2222:2222"

  # =========================
  # RANDOM OPEN PORT (unknown service)
  # =========================
  unknown-port:
    image: alpine
    command: ["sh", "-c", "apk add --no-cache busybox-extras >/dev/null && while true; do nc -l -p 5555 -e echo CHAOS; done"]
    ports:
      - "5555:5555"

  # =========================
  # SLOW TLS HANDSHAKE SIM (proxy adds latency)
  # =========================
  tls-slow-proxy:
    image: haproxy:latest
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "12443:12443"
    depends_on:
      - tls-modern

  # =========================
  # PHASE A1 — SERVICE INVENTORY EXPANSION (profile: phaseA)
  # =========================

  tls-altport:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/modern/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "15001:443"

  http-redirect:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/http-redirect/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18000:80"

  unknown-port-2:
    image: alpine
    profiles: ["phaseA"]
    command: ["sh", "-c", "apk add --no-cache busybox-extras >/dev/null && while true; do nc -l -p 5556 -e echo CHAOS2; done"]
    ports:
      - "5556:5556"

  postgres-plain:
    image: postgres:16
    profiles: ["phaseA"]
    environment:
      POSTGRES_DB: chaos
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: chaos
    ports:
      - "15432:5432"

  redis-plain:
    image: redis:7-alpine
    profiles: ["phaseA"]
    ports:
      - "16379:6379"

  rabbitmq-mgmt:
    image: rabbitmq:3-management
    profiles: ["phaseA"]
    ports:
      - "15672:15672"

  # =========================
  # PHASE A2 — TLS CHAIN SCENARIOS (profile: phaseA)
  # =========================

  tls-missing-intermediate:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/tls-missing-intermediate/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "13443:443"

  tls-rsa1024:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/tls-rsa1024/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "14443:443"

  tls-sha1:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/tls-sha1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "15443:443"

  # =========================
  # IDENTITY STACK (profile: identity)
  # =========================

  id-postgres:
    image: postgres:16
    profiles: ["identity"]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - id_postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    profiles: ["identity"]
    depends_on:
      - id-postgres
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://id-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
    command: ["start-dev"]
    expose:
      - "8080"

  keycloak-tls:
    image: nginx:stable
    profiles: ["identity"]
    depends_on:
      - keycloak
    volumes:
      - ./nginx/identity/keycloak/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "15449:443"

  step-ca:
    image: smallstep/step-ca
    profiles: ["identity"]
    environment:
      DOCKER_STEPCA_INIT_NAME: ChaosLab-StepCA
      DOCKER_STEPCA_INIT_DNS_NAMES: "localhost,step-ca,127.0.0.1"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
    volumes:
      - stepca_data:/home/step
    ports:
      - "19000:9000"

  openldap:
    image: osixia/openldap:1.5.0
    profiles: ["identity"]
    environment:
      LDAP_ORGANISATION: "ChaosLab"
      LDAP_DOMAIN: "chaos.local"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "13890:389"

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    profiles: ["identity"]
    depends_on:
      - openldap
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "18082:80"

  whoami:
    image: traefik/whoami:v1.10.1
    profiles: ["identity"]
    expose:
      - "80"

  mtls-gateway:
    image: nginx:stable
    profiles: ["identity"]
    depends_on:
      - whoami
      - step-ca
    volumes:
      - ./nginx/identity/mtls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      # We'll mount step-ca root so nginx can trust it (see note below)
      - stepca_data:/home/step:ro
    ports:
      - "16443:443"

volumes:
  id_postgres_data:
  stepca_data:
