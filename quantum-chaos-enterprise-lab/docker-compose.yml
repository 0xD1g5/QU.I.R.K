services:
  # =========================
  # MODERN TLS (TLS 1.3)
  # =========================
  tls-modern:
    image: nginx:stable
    volumes:
      - ./nginx/modern/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "443:443"

  # =========================
  # LEGACY TLS (TLS 1.0/1.1 enabled + weak-ish ciphers)
  # Note: Modern OpenSSL builds may refuse enabling truly ancient ciphers.
  # Still useful for "legacy protocol enabled" + TLS 1.2 fallback behavior.
  # =========================
  tls-legacy:
    image: nginx:stable
    volumes:
      - ./nginx/legacy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "8443:443"

  # =========================
  # EXPIRED CERT TLS
  # =========================
  tls-expired:
    image: nginx:stable
    volumes:
      - ./nginx/expired/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "9443:443"

  # =========================
  # SELFSIGNED CERT TLS
  # =========================
  tls-selfsigned:
    image: nginx:stable
    volumes:
      - ./nginx/selfsigned/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "10443:443"

  # =========================
  # mTLS REQUIRED (forces handshake/client cert failure)
  # Great for testing "handshake failure" vs "cert issues"
  # =========================
  tls-mtls-required:
    image: nginx:stable
    volumes:
      - ./nginx/mtls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "11443:443"

  # =========================
  # PLAINTEXT HTTP ON A "TLS-LIKE" PORT (wrong version number)
  # =========================
  http-on-8444:
    image: nginx:stable
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "8444:80"

  # =========================
  # HTTP ONLY LEGACY APP
  # =========================
  legacy-http:
    image: httpd:2.4
    ports:
      - "8000:80"

  # =========================
  # SSH ON NON-STANDARD PORT
  # =========================
  ssh-alt:
    image: lscr.io/linuxserver/openssh-server
    environment:
      - PASSWORD_ACCESS=true
      - USER_NAME=test
      - USER_PASSWORD=test
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "2222:2222"

  # =========================
  # RANDOM OPEN PORT (unknown service)
  # =========================
  unknown-port:
    image: alpine
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache busybox-extras >/dev/null && while true; do nc -l -p 5555 -e echo CHAOS; done"
      ]
    ports:
      - "5555:5555"

  # =========================
  # SLOW TLS HANDSHAKE SIM (proxy adds latency)
  # =========================
  tls-slow-proxy:
    image: haproxy:latest
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "12443:12443"
    depends_on:
      - tls-modern

  # =========================
  # PHASE A1 — SERVICE INVENTORY EXPANSION (profile: phaseA)
  # =========================
  tls-altport:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/modern/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "15001:443"

  http-redirect:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/http-redirect/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18000:80"

  unknown-port-2:
    image: alpine
    profiles: ["phaseA"]
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache busybox-extras >/dev/null && while true; do nc -l -p 5556 -e echo CHAOS2; done"
      ]
    ports:
      - "5556:5556"

  postgres-plain:
    image: postgres:16
    profiles: ["phaseA"]
    environment:
      POSTGRES_DB: chaos
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: chaos
    ports:
      - "15432:5432"

  redis-plain:
    image: redis:7-alpine
    profiles: ["phaseA"]
    ports:
      - "16379:6379"

  rabbitmq-mgmt:
    image: rabbitmq:3-management
    profiles: ["phaseA"]
    ports:
      - "15672:15672"

  # =========================
  # PHASE A2 — TLS CHAIN SCENARIOS (profile: phaseA)
  # =========================
  tls-missing-intermediate:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/tls-missing-intermediate/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "13443:443"

  tls-rsa1024:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/tls-rsa1024/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "14443:443"

  tls-sha1:
    image: nginx:stable
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/tls-sha1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "15443:443"

  # =========================
  # PHASE A3 — INGRESS / SNI (multi-vhost behind one TLS port) (profile: phaseA)
  # =========================
  ingress-sni:
    image: nginx:stable
    profiles: ["phaseA"]
    depends_on:
      - whoami
      - legacy-http
      - rabbitmq-mgmt
    volumes:
      - ./nginx/phaseA/ingress/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "24443:443"

  # =========================
  # PHASE B — CLOUD SIMULATORS (profile: cloud)
  # =========================
  localstack:
    image: localstack/localstack:latest
    profiles: ["cloud"]
    environment:
      - SERVICES=s3,sts,iam
      - DEBUG=0
    expose:
      - "4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  localstack-tls:
    image: nginx:stable
    profiles: ["cloud"]
    depends_on:
      - localstack
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "24566:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream localstack_upstream { server localstack:4566; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name aws.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://localstack_upstream;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    profiles: ["cloud"]
    command: ["azurite", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0", "--loose"]
    expose:
      - "10000"
      - "10001"
      - "10002"

  azurite-blob-tls:
    image: nginx:stable
    profiles: ["cloud"]
    depends_on:
      - azurite
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "21000:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream az_blob { server azurite:10000; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name blob.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://az_blob;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  azurite-queue-tls:
    image: nginx:stable
    profiles: ["cloud"]
    depends_on:
      - azurite
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "21001:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream az_queue { server azurite:10001; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name queue.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://az_queue;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  azurite-table-tls:
    image: nginx:stable
    profiles: ["cloud"]
    depends_on:
      - azurite
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "21002:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream az_table { server azurite:10002; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name table.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://az_table;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  # =========================
  # IDENTITY STACK (profile: identity)
  # =========================
  id-postgres:
    image: postgres:16
    profiles: ["identity"]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - id_postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    profiles: ["identity"]
    depends_on:
      - id-postgres
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://id-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
    command: ["start-dev"]
    expose:
      - "8080"

  keycloak-tls:
    image: nginx:stable
    profiles: ["identity"]
    depends_on:
      - keycloak
    volumes:
      - ./nginx/identity/keycloak/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "15449:443"

  step-ca:
    image: smallstep/step-ca
    profiles: ["identity"]
    environment:
      DOCKER_STEPCA_INIT_NAME: ChaosLab-StepCA
      DOCKER_STEPCA_INIT_DNS_NAMES: "localhost,step-ca,127.0.0.1"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
    volumes:
      - stepca_data:/home/step
    ports:
      - "19000:9000"

  openldap:
    image: osixia/openldap:1.5.0
    profiles: ["identity"]
    environment:
      LDAP_ORGANISATION: "ChaosLab"
      LDAP_DOMAIN: "chaos.local"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "13890:389"

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    profiles: ["identity"]
    depends_on:
      - openldap
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "18082:80"

  whoami:
    image: traefik/whoami:v1.10.1
    profiles: ["identity"]
    expose:
      - "80"

  mtls-gateway:
    image: nginx:stable
    profiles: ["identity"]
    depends_on:
      - whoami
      - step-ca
    volumes:
      - ./nginx/identity/mtls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - stepca_data:/home/step:ro
    ports:
      - "16443:443"

  # =========================
  # PHASE C — PKI / step-ca ISSUED mTLS (profile: pki)
  # =========================
  mtls-stepca-gateway:
    image: nginx:stable
    profiles: ["pki"]
    volumes:
      - ./certs/stepca:/etc/nginx/stepca:ro
    ports:
      - "17443:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream whoami_upstream { server whoami:80; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }

          server {
            listen 443 ssl;
            server_name mtls-stepca.chaos.local;

            ssl_certificate     /etc/nginx/stepca/mtls-stepca-fullchain.crt;
            ssl_certificate_key /etc/nginx/stepca/mtls-stepca.key;

            ssl_client_certificate /etc/nginx/stepca/root_ca.crt;
            ssl_verify_client on;

            location = /__tls_ok { return 200 "OK\n"; }

            location / {
              proxy_pass http://whoami_upstream;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  # =========================
  # PHASE 4 — JWT PROFILE (profile: jwt)
  # LAB-01: 4 JWT microservices with known weak algorithm configs
  # Ports: 20001-20004 (safe range — no conflicts with existing lab)
  # =========================
  jwt-rs256:
    build:
      context: ./jwt/rs256
    profiles: ["jwt"]
    ports:
      - "20001:8000"
    restart: unless-stopped

  jwt-hs256:
    build:
      context: ./jwt/hs256
    profiles: ["jwt"]
    ports:
      - "20002:8000"
    restart: unless-stopped

  jwt-rsa1024:
    build:
      context: ./jwt/rsa1024
    profiles: ["jwt"]
    ports:
      - "20003:8000"
    restart: unless-stopped

  jwt-algnone:
    build:
      context: ./jwt/algnone
    profiles: ["jwt"]
    ports:
      - "20004:8000"
    restart: unless-stopped

  # =========================
  # PHASE 4 — REGISTRY PROFILE (profile: registry)
  # LAB-02: Docker Registry v2 + 3 test images with old crypto libraries
  # Port: 20005 (safe range — no conflicts with existing lab)
  # =========================
  registry:
    image: registry:2
    profiles: ["registry"]
    ports:
      - "20005:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
    volumes:
      - registry_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/v2/"]
      interval: 5s
      timeout: 5s
      retries: 10

  registry-seed:
    image: docker:24-dind
    profiles: ["registry"]
    restart: "no"
    depends_on:
      registry:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./registry:/registry-build:ro
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    command: ["/bin/sh", "/registry-build/seed.sh"]

  # =========================
  # PHASE 4 — SOURCE PROFILE (profile: source)
  # LAB-03: Gitea + seeded repos with crypto anti-patterns
  # Port: 20006 (safe range — no conflicts)
  # =========================
  gitea:
    image: gitea/gitea:1.21
    profiles: ["source"]
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__ROOT_URL: "http://gitea:3000/"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__admin__DISABLE_REGULAR_ORG_CREATION: "false"
      GITEA__log__LEVEL: "warn"
    volumes:
      - gitea_data:/data
    ports:
      - "20006:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: >
      bash -c "
        /usr/local/bin/gitea web &
        sleep 10 &&
        gitea admin user create --admin --username admin --password admin123 --email admin@chaos.local --must-change-password false 2>/dev/null || true &&
        wait
      "

  gitea-seed:
    image: alpine:3.19
    profiles: ["source"]
    restart: "no"
    depends_on:
      gitea:
        condition: service_healthy
    volumes:
      - ./source/seed.sh:/seed.sh:ro
    command: >
      sh -c "apk add --no-cache curl git > /dev/null 2>&1 && sh /seed.sh"

  # =========================
  # PHASE 4 — STORAGE PROFILE (profile: storage)
  # LAB-04: LocalStack KMS + HashiCorp Vault + postgres-pgcrypto
  # Ports: 20007 (localstack-kms), 20009 (vault), 20010 (postgres-pgcrypto)
  # INDEPENDENT of existing cloud profile (different LocalStack instance, SERVICES=kms only)
  # =========================
  localstack-kms:
    image: localstack/localstack:latest
    profiles: ["storage"]
    environment:
      - SERVICES=kms
      - DEBUG=0
      - DEFAULT_REGION=us-east-1
    ports:
      - "20007:4566"
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"kms\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  localstack-kms-seed:
    image: amazon/aws-cli:latest
    profiles: ["storage"]
    restart: "no"
    depends_on:
      localstack-kms:
        condition: service_healthy
    volumes:
      - ./storage/kms-seed.sh:/kms-seed.sh:ro
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    entrypoint: ["/bin/sh", "/kms-seed.sh"]

  vault:
    image: hashicorp/vault:1.15
    profiles: ["storage"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "20009:8200"
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-dev"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault-seed:
    image: hashicorp/vault:1.15
    profiles: ["storage"]
    restart: "no"
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./storage/vault-seed.sh:/vault-seed.sh:ro
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
      VAULT_DEV_ROOT_TOKEN_ID: "root"
    entrypoint: ["/bin/sh", "/vault-seed.sh"]

  postgres-pgcrypto:
    image: postgres:16
    profiles: ["storage"]
    environment:
      POSTGRES_DB: pgcrypto_lab
      POSTGRES_USER: pglab
      POSTGRES_PASSWORD: pglab
    ports:
      - "20010:5432"
    volumes:
      - ./storage/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgcrypto_data:/var/lib/postgresql/data

  # =========================
  # PHASE 4 — SSH-WEAK PROFILE (profile: ssh-weak)
  # LAB-05: OpenSSH server with deliberately weak KEX/hostkey/MAC algorithms
  # Port: 20022 (safe range — no conflict with existing 2222 ssh-alt)
  # Base: ubuntu:18.04 / OpenSSH 7.6p1 (supports legacy algorithms)
  # =========================
  ssh-weak:
    build:
      context: ./ssh
    profiles: ["ssh-weak"]
    ports:
      - "20022:22"
    restart: unless-stopped

  # =========================
  # PHASE 4 — LDAPS PROFILE (profile: ldaps)
  # LAB-06: OpenLDAP over TLS on standard LDAPS port 636
  # Uses existing lab certs from ./certs/ (modern.crt, modern.key, ca.crt)
  # Independent of identity profile's openldap (port 13890 — unchanged)
  # =========================
  ldaps:
    image: osixia/openldap:1.5.0
    profiles: ["ldaps"]
    environment:
      LDAP_ORGANISATION: "ChaosLab"
      LDAP_DOMAIN: "chaos.local"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_TLS: "true"
      LDAP_TLS_CRT_FILENAME: modern.crt
      LDAP_TLS_KEY_FILENAME: modern.key
      LDAP_TLS_CA_CRT_FILENAME: ca.crt
      LDAP_TLS_VERIFY_CLIENT: "never"
    volumes:
      - ./certs:/container/service/slapd/assets/certs:ro
    ports:
      - "636:636"
    restart: unless-stopped

  # ── DNSSEC Chaos Lab (profile: dnssec) ──────────────────
  bind9-dnssec:
    build:
      context: ./bind9
      dockerfile: Dockerfile
    profiles: ["dnssec"]
    ports:
      - "15353:53/udp"
      - "15353:53/tcp"
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "weak.chaos.local", "SOA"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── SAML Chaos Lab (profile: saml) ────────────────────────
  simplesamlphp:
    image: kenchan0130/simplesamlphp
    profiles: ["saml"]
    environment:
      SIMPLESAMLPHP_SP_ENTITY_ID: "https://sp.chaos.local"
      SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE: "https://sp.chaos.local/acs"
    volumes:
      - ./simplesamlphp/cert/server.crt:/var/www/simplesamlphp/cert/server.crt:ro
      - ./simplesamlphp/cert/server.key:/var/www/simplesamlphp/cert/server.key:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/simplesaml/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Kerberos Chaos Lab (profile: kerberos) ──────────────────
  samba-dc:
    build:
      context: ./samba
      dockerfile: Dockerfile
    profiles: ["kerberos"]
    ports:
      - "88:88"
      - "389:389"
    healthcheck:
      test: ["CMD-SHELL", "smbclient -L localhost -N 2>/dev/null | grep -q QUIRK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

volumes:
  id_postgres_data:
  stepca_data:
  registry_data:
  gitea_data:
  pgcrypto_data:
