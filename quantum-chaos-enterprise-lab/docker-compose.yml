services:
  # =========================
  # MODERN TLS (TLS 1.3)
  # =========================
  tls-modern:
    image: nginx:1.28.0
    volumes:
      - ./nginx/modern/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "443:443"

  # =========================
  # LEGACY TLS (TLS 1.0/1.1 enabled + weak-ish ciphers)
  # Note: Modern OpenSSL builds may refuse enabling truly ancient ciphers.
  # Still useful for "legacy protocol enabled" + TLS 1.2 fallback behavior.
  # =========================
  tls-legacy:
    image: nginx:1.28.0
    volumes:
      - ./nginx/legacy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "8443:443"

  # =========================
  # EXPIRED CERT TLS
  # =========================
  tls-expired:
    image: nginx:1.28.0
    volumes:
      - ./nginx/expired/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "9443:443"

  # =========================
  # SELFSIGNED CERT TLS
  # =========================
  tls-selfsigned:
    image: nginx:1.28.0
    volumes:
      - ./nginx/selfsigned/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "10443:443"

  # =========================
  # mTLS REQUIRED (forces handshake/client cert failure)
  # Great for testing "handshake failure" vs "cert issues"
  # =========================
  tls-mtls-required:
    image: nginx:1.28.0
    volumes:
      - ./nginx/mtls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "11443:443"

  # =========================
  # PLAINTEXT HTTP ON A "TLS-LIKE" PORT (wrong version number)
  # =========================
  http-on-8444:
    image: nginx:1.28.0
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - "8444:80"

  # =========================
  # HTTP ONLY LEGACY APP
  # =========================
  legacy-http:
    image: httpd:2.4.63
    ports:
      - "8000:80"

  # =========================
  # SSH ON NON-STANDARD PORT
  # =========================
  ssh-alt:
    image: lscr.io/linuxserver/openssh-server:10.2_p1-r0-ls225
    environment:
      - PASSWORD_ACCESS=true
      - USER_NAME=test
      - USER_PASSWORD=test
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "2222:2222"

  # =========================
  # RANDOM OPEN PORT (unknown service)
  # =========================
  unknown-port:
    image: alpine:3.20
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache busybox-extras >/dev/null && while true; do nc -l -p 5555 -e echo CHAOS; done"
      ]
    ports:
      - "5555:5555"

  # =========================
  # SLOW TLS HANDSHAKE SIM (proxy adds latency)
  # =========================
  tls-slow-proxy:
    image: haproxy:3.0.5
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "12443:12443"
    depends_on:
      - tls-modern

  # =========================
  # PHASE A1 — SERVICE INVENTORY EXPANSION (profile: phaseA)
  # =========================
  tls-altport:
    image: nginx:1.28.0
    profiles: ["phaseA"]
    volumes:
      - ./nginx/modern/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "15001:443"

  http-redirect:
    image: nginx:1.28.0
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/http-redirect/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18000:80"

  unknown-port-2:
    image: alpine:3.20
    profiles: ["phaseA"]
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache busybox-extras >/dev/null && while true; do nc -l -p 5556 -e echo CHAOS2; done"
      ]
    ports:
      - "5556:5556"

  postgres-plain:
    image: postgres:16.6
    profiles: ["phaseA"]
    environment:
      POSTGRES_DB: chaos
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: chaos
    ports:
      - "15432:5432"

  redis-plain:
    image: redis:7.4.1-alpine
    profiles: ["phaseA"]
    ports:
      - "16379:6379"

  rabbitmq-mgmt:
    image: rabbitmq:3.13.7-management
    profiles: ["phaseA"]
    ports:
      - "15672:15672"

  # =========================
  # PHASE A2 — TLS CHAIN SCENARIOS (profile: phaseA)
  # =========================
  tls-missing-intermediate:
    image: nginx:1.28.0
    profiles: ["phaseA"]
    volumes:
      - ./nginx/phaseA/tls-missing-intermediate/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "13443:443"

  tls-rsa1024:
    image: nginx:1.28.0
    profiles: ["phaseA"]
    environment:
      - OPENSSL_CONF=/etc/nginx/openssl-legacy.cnf
    volumes:
      - ./nginx/phaseA/tls-rsa1024/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
      - ./nginx/openssl-legacy.cnf:/etc/nginx/openssl-legacy.cnf:ro
    ports:
      - "14443:443"

  tls-sha1:
    image: nginx:1.28.0
    profiles: ["phaseA"]
    environment:
      - OPENSSL_CONF=/etc/nginx/openssl-legacy.cnf
    volumes:
      - ./nginx/phaseA/tls-sha1/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
      - ./nginx/openssl-legacy.cnf:/etc/nginx/openssl-legacy.cnf:ro
    ports:
      - "15443:443"

  # =========================
  # PHASE A3 — INGRESS / SNI (multi-vhost behind one TLS port) (profile: phaseA)
  # =========================
  ingress-sni:
    image: nginx:1.28.0
    profiles: ["phaseA"]
    depends_on:
      - whoami
      - legacy-http
      - rabbitmq-mgmt
    volumes:
      - ./nginx/phaseA/ingress/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "24443:443"

  # =========================
  # PHASE B — CLOUD SIMULATORS (profile: cloud)
  # =========================
  localstack:
    image: localstack/localstack:3.8.1
    profiles: ["cloud"]
    environment:
      - SERVICES=s3,sts,iam
      - DEBUG=0
    expose:
      - "4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  localstack-tls:
    image: nginx:1.28.0
    profiles: ["cloud"]
    depends_on:
      - localstack
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "24566:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream localstack_upstream { server localstack:4566; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name aws.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://localstack_upstream;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    profiles: ["cloud"]
    command: ["azurite", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0", "--loose"]
    expose:
      - "10000"
      - "10001"
      - "10002"

  azurite-blob-tls:
    image: nginx:1.28.0
    profiles: ["cloud"]
    depends_on:
      - azurite
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "21000:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream az_blob { server azurite:10000; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name blob.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://az_blob;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  azurite-queue-tls:
    image: nginx:1.28.0
    profiles: ["cloud"]
    depends_on:
      - azurite
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "21001:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream az_queue { server azurite:10001; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name queue.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://az_queue;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  azurite-table-tls:
    image: nginx:1.28.0
    profiles: ["cloud"]
    depends_on:
      - azurite
    volumes:
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "21002:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream az_table { server azurite:10002; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }
          server {
            listen 443 ssl;
            server_name table.chaos.local;

            ssl_certificate     /etc/nginx/certs/modern.crt;
            ssl_certificate_key /etc/nginx/certs/modern.key;

            location = /__tls_ok { return 200 "OK\n"; }
            location / {
              proxy_pass http://az_table;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-Proto https;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  # =========================
  # IDENTITY STACK (profile: identity)
  # =========================
  id-postgres:
    image: postgres:16.6
    profiles: ["identity"]
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - id_postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    profiles: ["identity"]
    depends_on:
      - id-postgres
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://id-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
    command: ["start-dev"]
    expose:
      - "8080"

  keycloak-tls:
    image: nginx:1.28.0
    profiles: ["identity"]
    depends_on:
      - keycloak
    volumes:
      - ./nginx/identity/keycloak/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "15449:443"

  step-ca:
    image: smallstep/step-ca:0.28.1
    profiles: ["identity"]
    environment:
      DOCKER_STEPCA_INIT_NAME: ChaosLab-StepCA
      DOCKER_STEPCA_INIT_DNS_NAMES: "localhost,step-ca,127.0.0.1"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
    volumes:
      - stepca_data:/home/step
    ports:
      - "19000:9000"

  openldap:
    image: osixia/openldap:1.5.0
    profiles: ["identity"]
    environment:
      LDAP_ORGANISATION: "ChaosLab"
      LDAP_DOMAIN: "chaos.local"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "13890:389"

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    profiles: ["identity"]
    depends_on:
      - openldap
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "18082:80"

  whoami:
    image: traefik/whoami:v1.10.1
    profiles: ["identity", "phaseA"]
    expose:
      - "80"

  mtls-gateway:
    image: nginx:1.28.0
    profiles: ["identity"]
    depends_on:
      - whoami
      - step-ca
    volumes:
      - ./nginx/identity/mtls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - stepca_data:/home/step:ro
    ports:
      - "16443:443"

  # =========================
  # PHASE C — PKI / step-ca ISSUED mTLS (profile: pki)
  # =========================
  mtls-stepca-gateway:
    image: nginx:1.28.0
    profiles: ["pki"]
    volumes:
      - ./certs/stepca:/etc/nginx/stepca:ro
    ports:
      - "17443:443"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/nginx.conf <<'EOF'
        events {}
        http {
          upstream whoami_upstream { server whoami:80; }
          server { listen 443 ssl default_server; ssl_reject_handshake on; }

          server {
            listen 443 ssl;
            server_name mtls-stepca.chaos.local;

            ssl_certificate     /etc/nginx/stepca/mtls-stepca-fullchain.crt;
            ssl_certificate_key /etc/nginx/stepca/mtls-stepca.key;

            ssl_client_certificate /etc/nginx/stepca/root_ca.crt;
            ssl_verify_client on;

            location = /__tls_ok { return 200 "OK\n"; }

            location / {
              proxy_pass http://whoami_upstream;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            }
          }
        }
        EOF
        nginx -g 'daemon off;'

  # =========================
  # PHASE 4 — JWT PROFILE (profile: jwt)
  # LAB-01: 4 JWT microservices with known weak algorithm configs
  # Ports: 20001-20004 (safe range — no conflicts with existing lab)
  # =========================
  jwt-rs256:
    build:
      context: ./jwt/rs256
    profiles: ["jwt"]
    ports:
      - "20001:8000"
    restart: unless-stopped

  jwt-hs256:
    build:
      context: ./jwt/hs256
    profiles: ["jwt"]
    ports:
      - "20002:8000"
    restart: unless-stopped

  jwt-rsa1024:
    build:
      context: ./jwt/rsa1024
    profiles: ["jwt"]
    ports:
      - "20003:8000"
    restart: unless-stopped

  jwt-algnone:
    build:
      context: ./jwt/algnone
    profiles: ["jwt"]
    ports:
      - "20004:8000"
    restart: unless-stopped

  # =========================
  # PHASE 4 — REGISTRY PROFILE (profile: registry)
  # LAB-02: Docker Registry v2 + 3 test images with old crypto libraries
  # Port: 20005 (safe range — no conflicts with existing lab)
  # =========================
  registry:
    image: registry:2.8.3
    profiles: ["registry"]
    ports:
      - "20005:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
    volumes:
      - registry_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/v2/"]
      interval: 5s
      timeout: 5s
      retries: 10

  registry-seed:
    image: docker:24.0.9-dind
    profiles: ["registry"]
    restart: "no"
    depends_on:
      registry:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./registry:/registry-build:ro
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    command: ["/bin/sh", "/registry-build/seed.sh"]

  # =========================
  # PHASE 4 — SOURCE PROFILE (profile: source)
  # LAB-03: Gitea + seeded repos with crypto anti-patterns
  # Port: 20006 (safe range — no conflicts)
  # =========================
  gitea:
    image: gitea/gitea:1.21.11
    profiles: ["source"]
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__server__ROOT_URL: "http://gitea:3000/"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__admin__DISABLE_REGULAR_ORG_CREATION: "false"
      GITEA__log__LEVEL: "warn"
    volumes:
      - gitea_data:/data
    ports:
      - "20006:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # One-shot admin bootstrap. Runs as the `git` user via the image entrypoint,
  # creates the admin user on the shared sqlite db before the web container
  # serves traffic. Replaces the prior root-running `command:` wrapper on the
  # `gitea` service (BACK-90 bug 1, CONTEXT D-1 — keeps admin provisioning
  # declarative, no docker socket, no API bootstrap dance).
  gitea-init:
    image: gitea/gitea:1.21.11
    profiles: ["source"]
    restart: "no"
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__log__LEVEL: "warn"
    volumes:
      - gitea_data:/data
    entrypoint: ["/usr/bin/entrypoint"]
    command:
      - "/bin/sh"
      - "-c"
      - |
        set -e
        # Gitea web (already healthy via depends_on) has materialized
        # /data/gitea/conf/app.ini + sqlite schema. Idempotently create the
        # admin user as the `git` user (1.21+ refuses to run as root, so
        # `su git -c ...` satisfies the safety check). Replaces the prior
        # root-running `command:` wrapper on the gitea service (BACK-90 bug 1,
        # CONTEXT D-1 — admin provisioning moved out of `command:` block,
        # no docker socket mount, no API bootstrap dance).
        # NOTE: Gitea reserves the username "admin", so we provision "labadmin"
        # (mirrored in source/seed.sh). Password admin123 + email preserved.
        if su git -c "gitea admin user list" 2>/dev/null | grep -qE '(^|[[:space:]])labadmin([[:space:]]|$)'; then
          echo "labadmin user already exists; skipping"
        else
          su git -c "gitea admin user create --admin --username labadmin --password admin123 --email admin@chaos.local --must-change-password=false"
        fi

  gitea-seed:
    image: alpine:3.20
    profiles: ["source"]
    restart: "no"
    depends_on:
      gitea-init:
        condition: service_completed_successfully
    volumes:
      - ./source/seed.sh:/seed.sh:ro
    command: >
      sh -c "apk add --no-cache curl git > /dev/null 2>&1 && sh /seed.sh"

  # =========================
  # PHASE 30 — HASHICORP VAULT PROFILE (profile: vault)
  # LAB-30: Dedicated Vault dev server with seed scenarios for VAULT-01/02/03
  # Port: 28200 (safe range — does NOT collide with existing storage/vault at 20009)
  # Image: hashicorp/vault:1.17 (latest stable as of 2026-04)
  # =========================
  vault-30:
    image: hashicorp/vault:1.17
    profiles: ["vault"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "28200:8200"
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-dev"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault-30-seed:
    image: hashicorp/vault:1.17
    profiles: ["vault"]
    restart: "no"
    depends_on:
      vault-30:
        condition: service_healthy
    volumes:
      - ./vault/seed.sh:/seed.sh:ro
    environment:
      VAULT_ADDR: "http://vault-30:8200"
      VAULT_TOKEN: "root"
      VAULT_DEV_ROOT_TOKEN_ID: "root"
    entrypoint: ["/bin/sh", "/seed.sh"]

  # =========================
  # PHASE 4 — SSH-WEAK PROFILE (profile: ssh-weak)
  # LAB-05: OpenSSH server with deliberately weak KEX/hostkey/MAC algorithms
  # Port: 20022 (safe range — no conflict with existing 2222 ssh-alt)
  # Base: ubuntu:18.04 / OpenSSH 7.6p1 (supports legacy algorithms)
  # =========================
  ssh-weak:
    build:
      context: ./ssh
    profiles: ["ssh-weak"]
    ports:
      - "20022:22"
    restart: unless-stopped

  # =========================
  # PHASE 4 — LDAPS PROFILE (profile: ldaps)
  # LAB-06: OpenLDAP over TLS on standard LDAPS port 636
  # Uses existing lab certs from ./certs/ (modern.crt, modern.key, ca.crt)
  # Independent of identity profile's openldap (port 13890 — unchanged)
  # =========================
  ldaps:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    profiles: ["ldaps"]
    environment:
      LDAP_ROOT: "dc=chaos,dc=local"
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_PORT_NUMBER: 389
      LDAP_LDAPS_PORT_NUMBER: 636
      LDAP_ENABLE_TLS: "yes"
      LDAP_TLS_CERT_FILE: /opt/bitnami/openldap/certs/modern.crt
      LDAP_TLS_KEY_FILE: /opt/bitnami/openldap/certs/modern.key
      LDAP_TLS_CA_FILE: /opt/bitnami/openldap/certs/ca.crt
    volumes:
      - ./certs:/opt/bitnami/openldap/certs:ro
    ports:
      - "636:636"
    restart: unless-stopped

  # =========================
  # PHASE 95 — CODE-SIGNING LDAP FIXTURE (profile: ldaps, sidecar)
  # LAB-01 / CSIGN-01: Seeds the existing ldaps OpenLDAP instance with a user
  # carrying a userCertificate with CodeSigning EKU (OID 1.3.6.1.5.5.7.3.3)
  # and weak RSA-1024/SHA-1 — exercises the code-signing scanner HIGH path.
  # Base DN: dc=chaos,dc=local (NOT dc=quirk,dc=lab — Phase 95 Critical Caveat 4).
  # Mirrors the smime-seed sidecar pattern (D-79-R2 idempotency contract).
  # =========================
  ldaps-codesign-seed:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    profiles: ["ldaps"]
    depends_on:
      ldaps:
        condition: service_started
    # `ldapadd -c` = continue on already-exists errors. Idempotency contract:
    # re-running `./lab.sh up --profile ldaps` must not error. Exit 68 is
    # LDAP_ALREADY_EXISTS — swallow explicitly so sidecar exits 0 on re-run
    # (mirrors smime-seed Phase 79-01 deviation Rule 1, 2026-05-16).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "sleep 5 && ldapadd -c -x -H ldap://ldaps:389 -D 'cn=admin,dc=chaos,dc=local' -w admin -f /ldif/codesign-users.ldif; rc=$$?; if [ $$rc -eq 0 ] || [ $$rc -eq 68 ]; then exit 0; else exit $$rc; fi"
    volumes:
      - ./ldaps/ldif:/ldif:ro
    restart: "no"

  # =========================
  # PHASE 79 — S/MIME LDAP DISCOVERY (profile: smime)
  # SMIME-03 / SMIME-07: OpenLDAP seeded with three users carrying
  # userSMIMECertificate values — exercises weak-signing, weak-key, and SAFE
  # paths. Plain LDAP on host port 38900 only (LDAPS deferred per D-79-R9).
  # Image is bitnamilegacy/openldap:2.6.10-debian-12-r4 — D-79-UPDATE supersedes
  # CONTEXT D-Area-3's osixia:1.5.0 for macOS bind-mount compatibility (mirrors
  # the 2026-05-15 ldaps migration in DEF-999.83-A).
  # =========================
  smime-openldap:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    profiles: ["smime"]
    environment:
      LDAP_ROOT: "dc=quirk,dc=lab"
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_PORT_NUMBER: 389
    volumes:
      - ./smime/ldif:/ldif:ro
      - ./smime/certs:/smime-certs:ro
    ports:
      - "38900:389"
    restart: unless-stopped

  smime-seed:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    profiles: ["smime"]
    depends_on:
      smime-openldap:
        condition: service_started
    # `ldapadd -c` = continue on already-exists errors. Idempotency contract
    # per D-79-R2 — re-running `./lab.sh up --profile smime` must not error.
    # ldapadd's exit code is the LAST per-entry error, so on re-run it returns
    # 68 (LDAP_ALREADY_EXISTS) even with -c. We swallow exit 68 explicitly so
    # the seed sidecar exits 0 on both first and subsequent runs (Phase 79-01
    # deviation Rule 1, 2026-05-16).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "sleep 5 && ldapadd -c -x -H ldap://smime-openldap:389 -D 'cn=admin,dc=quirk,dc=lab' -w admin -f /ldif/users.ldif; rc=$$?; if [ $$rc -eq 0 ] || [ $$rc -eq 68 ]; then exit 0; else exit $$rc; fi"
    volumes:
      - ./smime/ldif:/ldif:ro
    restart: "no"

  # =========================
  # PHASE 80 — WINDOWS AD CS LDAP DISCOVERY (profile: adcs)
  # ADCS-03 / ADCS-08: OpenLDAP seeded with a deliberately misconfigured
  # AD CS Configuration partition — msPKI schema + 3 deterministic template
  # fixtures (BadTemplate-ESC1, BadTemplate-ESC4, SafeTemplate) + 1 RSA-1024
  # SHA-1 CA signing cert (`adcs/certs/ca-weak.der`). Plain LDAP on host port
  # 38910 only (LDAPS deferred per CONTEXT, mirrors smime D-79-R9 policy).
  # Read-only enumeration only — no enrollment, no CSR, no writes (ADCS-09).
  #
  # Schema loading: Plan 80-01 deviation Rule 1, 2026-05-16. The plan's
  # PRIMARY path (seed-sidecar `ldapadd` against cn=config) returns
  # "Insufficient access (50)" under Bitnami openldap because the network
  # ldap:// listener only honors RootDN/SIMPLE binds, and cn=config writes
  # require EXTERNAL auth on ldapi:/// (which is only reachable from inside
  # the container during entrypoint init). The plan's D-80-R7 FALLBACK
  # (Dockerfile `COPY ... etc/schema/msPKI.ldif`) also failed because
  # Bitnami's entrypoint does not auto-include arbitrary files dropped into
  # /opt/bitnami/openldap/etc/schema/ — it only includes the well-known
  # core/cosine/inetorgperson/nis chain plus `$LDAP_CUSTOM_SCHEMA_FILE`
  # (default /schema/custom.ldif) and `$LDAP_CUSTOM_SCHEMA_DIR` (/schemas).
  # Plan 80-01 deviation: use Bitnami's NATIVE schema-mount hook by mounting
  # adcs/schema/msPKI-schema.ldif at /schemas/msPKI.ldif and pointing
  # LDAP_CUSTOM_SCHEMA_DIR=/schemas at it; Bitnami's `ldap_add_custom_schemas`
  # then runs the ldapadd -Y EXTERNAL during init while the privileged
  # local socket is still active. The Dockerfile and schema LDIF on disk are
  # both preserved per the plan's "ship both branches" contract — flipping
  # back to either is a small compose-file diff away.
  # =========================
  adcs-openldap:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    profiles: ["adcs"]
    environment:
      LDAP_ROOT: "dc=quirk,dc=lab"
      LDAP_ADMIN_USERNAME: "admin"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_PORT_NUMBER: 389
      LDAP_ALLOW_ANON_BINDING: "yes"
      # Per Plan 80-01 deviation Rule 1: Bitnami-native schema load path.
      # The container's entrypoint runs `slapadd -F slapd.d -n 0 -l` for
      # every *.ldif under LDAP_CUSTOM_SCHEMA_DIR during initial setup
      # (offline). `msuser` is added to LDAP_EXTRA_SCHEMAS so msuser's
      # AD-compatible attribute types (cACertificate, nTSecurityDescriptor,
      # dNSHostName, pKIExtendedKeyUsage, pKIKeyUsage) load BEFORE the
      # msPKI overlay declares pKIEnrollmentService / pKICertificateTemplate
      # objectClasses that depend on them.
      LDAP_EXTRA_SCHEMAS: "cosine,inetorgperson,nis,msuser"
      LDAP_CUSTOM_SCHEMA_DIR: "/schemas"
    volumes:
      - ./adcs/schema:/schemas:ro
      - ./adcs/ldif:/ldif:ro
      - ./adcs/certs:/adcs-certs:ro
    ports:
      - "38910:389"
    restart: unless-stopped

  adcs-seed:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    profiles: ["adcs"]
    depends_on:
      adcs-openldap:
        condition: service_started
    # `ldapadd -c` = continue on already-exists errors (idempotency contract
    # mirrors smime D-79-R2 — re-running `./lab.sh up --profile adcs` must
    # not error). Schema add is best-effort (`|| true`) so a runtime cn=config
    # rejection (RESEARCH Pitfall 1) does not block the data adds; flip to the
    # Dockerfile fallback per D-80-R7 + adcs/README.md if rejection persists.
    # On re-run, ldapadd returns 68 (LDAP_ALREADY_EXISTS); we swallow it.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "sleep 8 && ldapadd -c -x -H ldap://adcs-openldap:389 -D 'cn=admin,dc=quirk,dc=lab' -w admin -f /ldif/00-base.ldif; ldapadd -c -x -H ldap://adcs-openldap:389 -D 'cn=admin,dc=quirk,dc=lab' -w admin -f /ldif/10-ca.ldif; ldapadd -c -x -H ldap://adcs-openldap:389 -D 'cn=admin,dc=quirk,dc=lab' -w admin -f /ldif/20-templates.ldif; rc=$$?; if [ $$rc -eq 0 ] || [ $$rc -eq 68 ]; then exit 0; else exit $$rc; fi"
    volumes:
      - ./adcs/schema:/schema:ro
      - ./adcs/ldif:/ldif:ro
    restart: "no"

  # ── DNSSEC Chaos Lab (profile: dnssec) ──────────────────
  bind9-dnssec:
    build:
      context: ./bind9
      dockerfile: Dockerfile
    profiles: ["dnssec"]
    ports:
      - "15353:53/udp"
      - "15353:53/tcp"
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "weak.chaos.local", "SOA"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── SAML Chaos Lab (profile: saml) ────────────────────────
  simplesamlphp:
    image: kenchan0130/simplesamlphp:1.19.7
    profiles: ["saml"]
    environment:
      SIMPLESAMLPHP_SP_ENTITY_ID: "https://sp.chaos.local"
      SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE: "https://sp.chaos.local/acs"
    volumes:
      - ./simplesamlphp/cert/server.crt:/var/www/simplesamlphp/cert/server.crt:ro
      - ./simplesamlphp/cert/server.key:/var/www/simplesamlphp/cert/server.key:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/simplesaml/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Kerberos Chaos Lab (profile: kerberos) ──────────────────
  samba-dc:
    build:
      context: ./samba
      dockerfile: Dockerfile
    profiles: ["kerberos"]
    ports:
      - "88:88"
      - "389:389"
    healthcheck:
      test: ["CMD-SHELL", "smbclient -L localhost -N 2>/dev/null | grep -q QUIRK || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  # =========================
  # PHASE 27 — DATABASE SSL DETECTION (profile: database)
  # =========================
  postgres-ssl-off:
    image: postgres:15.10
    profiles: ["database"]
    environment:
      POSTGRES_DB: quirk_db
      POSTGRES_USER: quirk_scanner
      POSTGRES_PASSWORD: quirk_scanner
    command: postgres -c ssl=off
    ports:
      - "25432:5432"

  mysql-ssl-off:
    image: mysql:8.0.40
    profiles: ["database"]
    environment:
      MYSQL_DATABASE: quirk_db
      MYSQL_USER: quirk_scanner
      MYSQL_PASSWORD: quirk_scanner
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: "root"
    command: --skip-ssl
    ports:
      - "23306:3306"

  # ===========================================================================================
  # PHASE 28 — OBJECT STORAGE PROFILE (profile: storage-s3)
  # MinIO S3-compatible local server for STOR-01 validation. Distinct from "storage" profile
  # (which already serves vault/localstack-kms/pgcrypto from earlier phases).
  # ===========================================================================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    profiles: ["storage-s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_KMS_SECRET_KEY: "lab-key:e6QwR1eRz0t8u3y2z6mP/m4G2D8jH7yB3KvN0aN8z7M="
    ports:
      - "29000:9000"
      - "29001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-seed:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    profiles: ["storage-s3"]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./storage/minio-seed.sh:/minio-seed.sh:ro
    entrypoint: ["/bin/sh", "/minio-seed.sh"]

  # ===========================================================================================
  # PHASE 32 — EMAIL CHAOS LAB (profile: email)
  # Postfix + Dovecot with weak RSA-2048 TLS (non-PFS, TLS 1.2 minimum).
  # Generate certs first: make -C ../labs/email certs
  # Bring up:             docker compose --profile email up -d
  # ===========================================================================================
  postfix-email:
    build:
      context: ../labs/email
      dockerfile: Dockerfile
    container_name: quirk-chaos-postfix-email
    profiles: ["email"]
    ports:
      - "30025:25"
      - "30465:465"
      - "30587:587"
    volumes:
      - ../labs/email/certs/postfix.crt:/etc/postfix/certs/postfix.crt:ro
      - ../labs/email/certs/postfix.key:/etc/postfix/certs/postfix.key:ro
    healthcheck:
      test: ["CMD-SHELL", "postfix status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  dovecot-email:
    build:
      context: ../labs/email
      dockerfile: Dockerfile
    container_name: quirk-chaos-dovecot-email
    profiles: ["email"]
    command: ["/usr/sbin/dovecot", "-F"]
    environment:
      # Cap TLS at 1.2 via OpenSSL system config — Dovecot 2.3.16 lacks ssl_max_protocol
      OPENSSL_CONF: /etc/dovecot/openssl-tls12-only.cnf
    ports:
      - "30143:143"
      - "30993:993"
      - "30110:110"
      - "30995:995"
    volumes:
      - ../labs/email/certs/dovecot.crt:/etc/dovecot/private/dovecot.crt:ro
      - ../labs/email/certs/dovecot.key:/etc/dovecot/private/dovecot.key:ro
    healthcheck:
      test: ["CMD-SHELL", "doveadm who >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Broker Chaos Lab (profile: broker) ─────────────────────
  # Phase 33 / BROKER-LAB-01. Official images per CONTEXT.md D-15 (2026-04-27 revision).
  # Weak TLS via bind-mounted config files. Plaintext ports intentionally listening.
  kafka-broker:
    image: apache/kafka:3.7.0
    profiles: ["broker"]
    hostname: kafka-broker
    ports:
      - "29092:29092"
      - "29093:29093"
    volumes:
      - ../labs/broker/kafka/server.properties:/etc/kafka/server.properties:ro
      - ../labs/broker/certs/kafka.crt:/etc/kafka/secrets/kafka.crt:ro
      - ../labs/broker/certs/kafka.key:/etc/kafka/secrets/kafka.key:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  rabbitmq-broker:
    # Pinned to specific 3.13.x patch (3.12.x EOL 2024-06-26). Phase 82-02 / CHAOS-02.
    image: rabbitmq:3.13.7-management
    profiles: ["broker"]
    hostname: rabbitmq-broker
    ports:
      - "25672:5672"
      - "25671:5671"
    environment:
      - RABBITMQ_CONFIG_FILE=/etc/rabbitmq/rabbitmq.conf
      # [lab-only] Deterministic Erlang cookie — fixes DEF-999.83-B cookie reset
      # across `lab.sh down/up` cycles. NOT a secret; lab-isolated.
      - RABBITMQ_ERLANG_COOKIE=lab-erlang-cookie-do-not-use-in-prod
    volumes:
      - ../labs/broker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ../labs/broker/certs/rabbitmq.crt:/etc/rabbitmq/certs/server.crt:ro
      - ../labs/broker/certs/rabbitmq.key:/etc/rabbitmq/certs/server.key:ro
      - ../labs/broker/certs/rabbitmq.crt:/etc/rabbitmq/certs/ca.crt:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  redis-broker:
    image: redis:7.4.1-alpine
    profiles: ["broker"]
    hostname: redis-broker
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports:
      - "26379:6379"
      - "26380:6380"
    volumes:
      - ../labs/broker/redis/redis.conf:/etc/redis/redis.conf:ro
      - ../labs/broker/certs/redis.crt:/etc/redis/certs/redis.crt:ro
      - ../labs/broker/certs/redis.key:/etc/redis/certs/redis.key:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  # =========================
  # PHASE 46 — TLS CERT DEFECTS PROFILE (profile: tls-cert-defects)
  # Single-profile target exercising all four cert-defect finding classes
  # (TLS-FIND-01..05) for end-to-end UAT. Ports 13444-13447 (13443 is taken
  # by phaseA tls-missing-intermediate). Existing tls-expired (9443) and
  # tls-selfsigned (10443) profiles remain unchanged for back-compat.
  # =========================
  tls-cert-expired:
    image: nginx:1.28.0
    profiles: ["tls-cert-defects"]
    volumes:
      - ./nginx/cert-defects/expired/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "13444:443"

  tls-cert-selfsigned:
    image: nginx:1.28.0
    profiles: ["tls-cert-defects"]
    volumes:
      - ./nginx/cert-defects/selfsigned/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "13445:443"

  tls-cert-untrusted-ca:
    image: nginx:1.28.0
    profiles: ["tls-cert-defects"]
    volumes:
      - ./nginx/cert-defects/untrusted-ca/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "13446:443"

  tls-cert-rsa1024:
    image: nginx:1.28.0
    profiles: ["tls-cert-defects"]
    environment:
      - OPENSSL_CONF=/etc/nginx/openssl-legacy.cnf
    volumes:
      - ./nginx/cert-defects/rsa1024/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/openssl-legacy.cnf:/etc/nginx/openssl-legacy.cnf:ro
      - ./certs/scenarios:/etc/nginx/scenarios:ro
    ports:
      - "13447:443"

  # ── Phase 89 / LAB-01 — postgres-tls ──────────────────────────────────────
  # Weak-TLS PostgreSQL (RSA key-exchange ciphers, no PFS). Scanner probe:
  # sslyze ProtocolWithOpportunisticTlsEnum.POSTGRES on port 39432.
  postgres-tls:
    image: postgres:16.6
    profiles: ["postgres-tls"]
    hostname: postgres-tls
    environment:
      POSTGRES_DB: chaos
      POSTGRES_USER: chaos
      POSTGRES_PASSWORD: chaos
    volumes:
      - ../labs/postgres-tls/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../labs/postgres-tls/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ../labs/postgres-tls/certs/postgres-tls.crt:/etc/ssl/certs/postgres-tls.crt:ro
      # Key mounted under /var/lib/postgresql/ (owned by postgres uid 999) to satisfy
      # PostgreSQL's requirement that the SSL private key is owned by the server user.
      - ../labs/postgres-tls/certs/postgres-tls.key:/var/lib/postgresql/postgres-tls.key:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "39432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaos || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Phase 89 / LAB-02 — redis-tls ─────────────────────────────────────────
  # Standalone Redis with weak TLS (3DES+RSA ciphers). Separate from broker profile.
  # Scanner probe: broker_scanner.py scan_redis_targets() on port 39380.
  redis-tls:
    image: redis:7.4.1-alpine
    profiles: ["redis-tls"]
    hostname: redis-tls
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports:
      - "39380:6380"
      - "39379:6379"
    volumes:
      - ../labs/redis-tls/redis.conf:/etc/redis/redis.conf:ro
      - ../labs/redis-tls/certs/redis-tls.crt:/etc/redis/certs/redis-tls.crt:ro
      - ../labs/redis-tls/certs/redis-tls.key:/etc/redis/certs/redis-tls.key:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s

  # ── Phase 89 / LAB-04 — kafka-tls ─────────────────────────────────────────
  # Standalone Kafka with weak TLS (RSA key-exchange ciphers). apache/kafka:3.9.0.
  # Scanner probe: broker_scanner.py scan_kafka_targets() on 39092 (PLAIN) + 39093 (TLS).
  kafka-tls:
    image: apache/kafka:3.9.0
    profiles: ["kafka-tls"]
    hostname: kafka-tls
    ports:
      - "39093:9093"
      - "39092:9092"
    volumes:
      - ../labs/kafka-tls/server.properties:/etc/kafka/server.properties:ro
      - ../labs/kafka-tls/certs/kafka-tls.crt:/etc/kafka/secrets/kafka-tls.crt:ro
      - ../labs/kafka-tls/certs/kafka-tls.key:/etc/kafka/secrets/kafka-tls.key:ro
    healthcheck:
      # Healthcheck uses PLAINTEXT port 9092 — avoids needing truststore/client-cert.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  # ── Phase 90 / PQC-01 — oqs-nginx ─────────────────────────────────────────
  # Digest-pinned openquantumsafe/nginx serving a TLS 1.3 endpoint that
  # negotiates the X25519MLKEM768 hybrid KEM group (NamedGroup 4588, NIST ML-KEM).
  # ML-DSA-65 (Dilithium) certificate from the image's bundled /opt/nginx/pki/.
  # Scanner probe: raw openssl s_client -connect 127.0.0.1:39444 -groups X25519MLKEM768
  #   (sslyze cannot handshake with this endpoint — see D-01 in 90-CONTEXT.md).
  # Requires --allow-internal-targets for live QUIRK scan (loopback bind).
  oqs-nginx:
    image: openquantumsafe/nginx@sha256:6ca18ac692f347ea9d4c3fdab4231189f2146570cd03c4d8fb486bba208ef870
    profiles: ["oqs-nginx"]
    hostname: oqs-nginx
    ports:
      - "127.0.0.1:39444:443"
    volumes:
      - ./oqs-nginx/nginx.conf:/opt/nginx/nginx-conf/nginx.conf:ro
    healthcheck:
      # Use 127.0.0.1 explicitly — `localhost` may resolve to ::1 in this image's
      # /etc/hosts, but nginx listens on 0.0.0.0 (IPv4 only), so ::1 fails.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 443 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Phase 89 / LAB-05 — grpc-tls ──────────────────────────────────────────
  # Minimal Go gRPC server (grpc-go auto-sets ALPN h2 via TLS credentials).
  # Self-signed RSA-2048 cert → quantum-vulnerable MEDIUM finding expected.
  # Scanner probe: sslyze direct TLS on port 39443 (CERTIFICATE_INFO + ciphers).
  # CHAOS-05: build-only service; Dockerfile FROM golang:1.23-alpine satisfies pin gate.
  grpc-tls:
    build:
      context: ../labs/grpc-tls
      dockerfile: Dockerfile
    profiles: ["grpc-tls"]
    hostname: grpc-tls
    ports:
      - "39443:443"
    volumes:
      - ../labs/grpc-tls/certs/grpc-tls.crt:/tls/server.crt:ro
      - ../labs/grpc-tls/certs/grpc-tls.key:/tls/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 443 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
  # =========================
  # PHASE 96 / LAB-01 — FUZZ-TARGET PROFILE (profile: fuzz-target)
  # Deliberately-weak REST service for active REST fuzzer validation.
  # INTENTIONAL WEAKNESSES: no HSTS, http:// server URL, /probe accepts forged JWT.
  # Port: 20100 (safe range — no conflicts with existing lab profiles).
  # lab.sh ALL_PROFILES needs NO edit — _derive_all_profiles discovers this
  # profile dynamically by parsing docker-compose.yml at runtime.
  # =========================
  fuzz-target:
    build:
      context: ./fuzz-target
    profiles: ["fuzz-target"]
    ports:
      - "20100:8000"
    restart: unless-stopped

