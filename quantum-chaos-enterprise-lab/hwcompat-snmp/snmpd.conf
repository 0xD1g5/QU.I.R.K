# Net-SNMP daemon configuration for hwcompat-snmp chaos lab container
# Simulates a Cisco IOS device for QUIRK SNMP-based hardware fingerprinting tests.
# Profile: hwcompat — Port 20223 UDP

# Listen on all interfaces, UDP port 161
agentAddress udp:161

# Read-only community string — allow queries from any source
rocommunity public default

# System identity OIDs
sysDescr "Cisco IOS Software, Version 15.2(4)M3, RELEASE SOFTWARE (fc2)"
sysName "cisco-sim-hwcompat"
sysObjectID 1.3.6.1.4.1.9.1.1

# Disable access logging for lab cleanliness
dontLogTCPWrappersConnects yes
