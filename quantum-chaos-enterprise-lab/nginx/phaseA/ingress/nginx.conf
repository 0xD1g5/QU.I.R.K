events {}

http {
  # Backends
  upstream whoami_upstream { server whoami:80; }
  upstream legacy_http_upstream { server legacy-http:80; }
  upstream rabbitmq_mgmt_upstream { server rabbitmq-mgmt:15672; }

  # -------------------------
  # app1.chaos.local -> whoami
  # -------------------------
  server {
    listen 443 ssl;
    server_name app1.chaos.local;

    ssl_certificate     /etc/nginx/certs/modern.crt;
    ssl_certificate_key /etc/nginx/certs/modern.key;

    location / {
      proxy_pass http://whoami_upstream;
      proxy_set_header Host $host;
    }
  }

  # -------------------------
  # app2.chaos.local -> whoami (different path)
  # -------------------------
  server {
    listen 443 ssl;
    server_name app2.chaos.local;

    ssl_certificate     /etc/nginx/certs/modern.crt;
    ssl_certificate_key /etc/nginx/certs/modern.key;

    location / {
      proxy_pass http://whoami_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Env "app2";
    }
  }

  # -------------------------
  # legacy.chaos.local -> legacy HTTP app (TLS terminated here)
  # -------------------------
  server {
    listen 443 ssl;
    server_name legacy.chaos.local;

    ssl_certificate     /etc/nginx/certs/modern.crt;
    ssl_certificate_key /etc/nginx/certs/modern.key;

    location / {
      proxy_pass http://legacy_http_upstream;
      proxy_set_header Host $host;
    }
  }

  # -------------------------
  # rabbitmq.chaos.local -> RabbitMQ management UI (TLS terminated here)
  # -------------------------
  server {
    listen 443 ssl;
    server_name rabbitmq.chaos.local;

    ssl_certificate     /etc/nginx/certs/modern.crt;
    ssl_certificate_key /etc/nginx/certs/modern.key;

    location / {
      proxy_pass http://rabbitmq_mgmt_upstream;
      proxy_set_header Host $host;
    }
  }

  # -------------------------
  # default: return something useful
  # -------------------------
  server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/modern.crt;
    ssl_certificate_key /etc/nginx/certs/modern.key;

    location / {
      return 200 "Ingress-SNI OK. Try app1/app2/legacy/rabbitmq hostnames.\n";
    }
  }
}
