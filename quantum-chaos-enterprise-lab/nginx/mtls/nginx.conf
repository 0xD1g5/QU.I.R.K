events {}

http {
  server {
    listen 443 ssl;
    server_name mtls.chaos.local;

    ssl_certificate     /etc/nginx/certs/modern.crt;
    ssl_certificate_key /etc/nginx/certs/modern.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    # Require client cert
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client on;

    location / {
      return 200 "OK - mtls\n";
    }
  }
}

