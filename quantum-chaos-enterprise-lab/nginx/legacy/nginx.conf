events {}

http {
  server {
    listen 443 ssl;
    server_name legacy.chaos.local;

    ssl_certificate     /etc/nginx/certs/legacy.crt;
    ssl_certificate_key /etc/nginx/certs/legacy.key;

    # Attempt to enable older versions; if OpenSSL disallows, it will fall back.
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;

    # "Legacy-ish" ciphers (OpenSSL may prune weak ones depending on build)
    ssl_ciphers HIGH:MEDIUM:!aNULL:!MD5;

    location / {
      return 200 "OK - legacy TLS\n";
    }
  }
}

