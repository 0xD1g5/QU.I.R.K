server {
    listen 80;

    location / {
        add_header X-Device-Model "HPE-iLO5";
        add_header Server "iLO/5.0";
        default_type text/html;
        return 200 '<html><head><title>HPE Integrated Lights-Out 5</title></head><body>iLO 5 Management</body></html>';
    }

    location /api/system/info {
        add_header X-Device-Model "HPE-iLO5";
        add_header Content-Type "application/json";
        return 200 '{"model":"HPE-iLO5","vendor":"HPE","version":"5.0.0"}';
    }

    location /mgmt/ {
        add_header X-Device-Model "HPE-iLO5";
        add_header Server "iLO/5.0";
        default_type text/html;
        return 200 '<html><head><title>HPE iLO 5 Management</title></head><body>HPE Integrated Lights-Out 5</body></html>';
    }
}
