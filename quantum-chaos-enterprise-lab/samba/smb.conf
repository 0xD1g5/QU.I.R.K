# Samba DC configuration for QUIRK.LAB chaos lab
# Per D-14: kerberos encryption types = all enables RC4 alongside AES
# Per D-16: realm = QUIRK.LAB
[global]
    workgroup = QUIRK
    realm = QUIRK.LAB
    netbios name = DC1
    server role = active directory domain controller
    dns forwarder = 8.8.8.8

    # Enable RC4-HMAC alongside AES (D-14, Pitfall 5)
    kerberos encryption types = all
    ntlm auth = ntlmv1-permitted

    # Logging
    log file = /var/log/samba/%m.log
    log level = 1
