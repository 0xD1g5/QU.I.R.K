# vertical: healthcare

assessment:
  name: "Quantum Crypto Readiness - CLIENT NAME"
  data_classification: "confidential"   # public|internal|confidential|regulated
  report_owner: "CLIENT NAME"
  timezone: "America/New_York"

scan:
  timeout_seconds: 5
  concurrency: 200
  ports_tls: [443,8443,9443,10443,11443,12443,8444,8000,2222,5555]
  include_sni: true

  tls_enum_mode: fast  # off|fast|deep

  fingerprint_timeout_seconds: 2
  fingerprint_concurrency: 200

  tls_timeout_seconds: 5
  tls_concurrency: 150

  ssh_timeout_seconds: 5
  ssh_concurrency: 100

targets:
  fqdns:
  cidrs: [127.0.0.1]
  include_ips: []
  exclude_ips: []

connectors:
  enable_aws: false
  enable_azure: false
  # -- Identity connectors (Phase 89 LAB-06 / D-04) --
  # Kerberos KDC: samba-dc on the chaos lab kerberos profile (port 88/389)
  enable_kerberos: true
  kerberos_targets:
    - "127.0.0.1"
  # SAML IdP: simplesamlphp on the chaos lab saml profile (port 8080)
  enable_saml: true
  saml_targets:
    - "http://localhost:8080/simplesaml/saml2/idp/metadata.php"
  # DNSSEC: bind9-dnssec on the chaos lab dnssec profile (port 15353)
  enable_dnssec: true
  dnssec_targets:
    - "weak.example.com"
    - "unsigned.example.com"
  # Route DNSSEC queries to the lab's bind9 resolver on port 15353
  # (dnssec_scanner.py port-override support added Phase 89 LAB-06)
  dnssec_resolver: "127.0.0.1:15353"

output:
  directory: "output"
  db_path: "output/quirk.db"

intelligence:
  intelligence_version: "3.9.0"
  profile: "balanced"        # lenient|balanced|strict
  calibration_overrides: {}

# Phase 121: Server-policy flag for internal target scanning.
# Set to false on machines that also scan untrusted client environments.
security:
  allow_internal_targets: true

# Console behavior settings (Phase 114 AUTOMERGE-02)
console:
  auto_merge:
    enabled: true                        # default: ON (D-07); set false to require manual `quirk sensor merge`
    trigger_condition: all-sensors-in    # "all-sensors-in" | "cadence-window" (D-08)
    # cadence_window_minutes: 1440       # used only when trigger_condition: cadence-window
    #                                    # defaults to per-sensor expected_cadence_minutes (D-09)
