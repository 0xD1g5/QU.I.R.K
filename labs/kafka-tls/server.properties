# kafka-tls chaos-lab configuration
# Phase 89 / LAB-04 — intentionally weak TLS posture (D-02)
# Mirrors labs/broker/kafka/server.properties weak knobs; uses apache/kafka:3.9.0
# Purpose: standalone Kafka-TLS target for broker_scanner.py probe on ports 9092/9093

process.roles=broker,controller
node.id=1
controller.quorum.voters=1@kafka-tls:9094
listeners=PLAINTEXT://:9092,SSL://:9093,CONTROLLER://:9094
advertised.listeners=PLAINTEXT://localhost:39092,SSL://localhost:39093
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,SSL:SSL,CONTROLLER:CONTROLLER
inter.broker.listener.name=SSL
controller.listener.names=CONTROLLER

# Weak TLS: RSA key exchange ciphers, no forward secrecy (quantum-vulnerable, D-02)
ssl.enabled.protocols=TLSv1.2
ssl.cipher.suites=TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA
ssl.client.auth=none

# PEM keystore using separate certificate chain + key files (Pitfall 2: avoids
# combined-PEM ambiguity by using the explicit two-property form)
ssl.keystore.type=PEM
ssl.keystore.certificate.chain=/etc/kafka/secrets/kafka-tls.crt
ssl.keystore.key=/etc/kafka/secrets/kafka-tls.key
