# postgres-tls chaos-lab configuration
# Phase 89 / LAB-01 — intentionally weak TLS posture (D-02)
# Purpose: exercise sslyze ProtocolWithOpportunisticTlsEnum.POSTGRES detection

# Basic settings
listen_addresses = '*'
max_connections = 20

# TLS: enabled with weak RSA key-exchange ciphers (no forward secrecy)
ssl = on
ssl_cert_file = '/etc/ssl/certs/postgres-tls.crt'
ssl_key_file  = '/var/lib/postgresql/postgres-tls.key'
ssl_ca_file   = '/etc/ssl/certs/postgres-tls.crt'

# TLS version: 1.2 only (TLS 1.0/1.1 disabled by modern OpenSSL)
ssl_min_protocol_version = 'TLSv1.2'
ssl_max_protocol_version = 'TLSv1.2'

# Weak ciphers: RSA key exchange = no forward secrecy (quantum-vulnerable)
# AES128-SHA and AES256-SHA use RSA key exchange with no PFS — intentional lab weakness.
ssl_ciphers = 'AES128-SHA:AES256-SHA'
