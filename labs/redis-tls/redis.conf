# redis-tls chaos-lab configuration
# Phase 89 / LAB-02 — intentionally weak TLS posture (D-02)
# Mirrors labs/broker/redis/redis.conf (verified working weak config)
# Purpose: standalone Redis-TLS target for broker_scanner.py probe on port 6380

port 6379
tls-port 6380
tls-cert-file /etc/redis/certs/redis-tls.crt
tls-key-file  /etc/redis/certs/redis-tls.key
tls-ca-cert-file /etc/redis/certs/redis-tls.crt
tls-auth-clients no
tls-protocols "TLSv1.2"
tls-ciphers "DES-CBC3-SHA:AES128-SHA:AES256-SHA"
tls-prefer-server-ciphers yes
