name: Python CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# IN-01: Least-privilege token — this workflow only needs to check out code.
permissions:
  contents: read

jobs:
  windows-sensor-smoke:
    name: Windows Sensor Smoke
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project (editable) and pytest
        run: |
          pip install -e .
          pip install pytest

      - name: Run Windows sensor smoke tests
        run: pytest tests/test_sensor_windows_smoke.py tests/test_sensor_no_verify_false.py -v

  windows-packaging-spike:
    name: Windows Packaging Spike
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project and PyInstaller
        run: |
          pip install -e .
          pip install pyinstaller==6.20.0

      - name: Build onefile EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --name quirk `
            --collect-all quirk `
            --collect-all sqlalchemy `
            --collect-all fastapi `
            --copy-metadata quirk-scanner `
            --hidden-import sqlalchemy.dialects.sqlite `
            --hidden-import sqlalchemy.dialects.sqlite.pysqlite `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --add-data "quirk/compliance/cmvp_cache.json;quirk/compliance" `
            --add-data "quirk/compliance/cmvp_curated.csv;quirk/compliance" `
            --add-data "quirk/reports/templates;quirk/reports/templates" `
            run_scan.py 2>&1 | Tee-Object -FilePath pyinstaller-build.log

      - name: Report build outcome
        if: always()
        shell: pwsh
        run: |
          if (Test-Path dist/quirk.exe) {
            $mb = [math]::Round((Get-Item dist/quirk.exe).Length / 1MB, 1)
            Write-Output "RESULT: BUILD_SUCCESS --- EXE size: $mb MB"
          } else {
            Write-Output "RESULT: BUILD_FAILED --- see pyinstaller-build.log artifact"
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pyinstaller-spike-evidence
          path: |
            pyinstaller-build.log
            build/quirk/warn-quirk.txt
            dist/quirk.exe
          retention-days: 30
          if-no-files-found: ignore

  windows-sensor-build:
    name: Windows Sensor Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project and PyInstaller
        shell: pwsh
        run: |
          pip install -e .
          if ($LASTEXITCODE -ne 0) { Write-Error "pip install -e . failed"; exit 1 }
          pip install pyinstaller==6.20.0
          if ($LASTEXITCODE -ne 0) { Write-Error "pip install pyinstaller failed"; exit 1 }

      - name: Build onedir EXE
        shell: pwsh
        run: |
          pyinstaller --onedir --name quirk `
            --collect-all quirk `
            --collect-all sqlalchemy `
            --collect-all fastapi `
            --collect-all cyclonedx `
            --collect-all jsonschema `
            --collect-all jsonschema_specifications `
            --collect-all rfc3987_syntax `
            --collect-all lark `
            --copy-metadata quirk-scanner `
            --hidden-import sqlalchemy.dialects.sqlite `
            --hidden-import sqlalchemy.dialects.sqlite.pysqlite `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --add-data "quirk/compliance/cmvp_cache.json;quirk/compliance" `
            --add-data "quirk/compliance/cmvp_curated.csv;quirk/compliance" `
            --add-data "quirk/reports/templates;quirk/reports/templates" `
            run_scan.py

      - name: Smoke-test frozen EXE (--version and --help)
        shell: pwsh
        run: |
          $expected = python -c "from quirk import __version__; print(__version__)"
          if ($LASTEXITCODE -ne 0 -or -not $expected) {
            Write-Error "Failed to read expected version from package (LASTEXITCODE=$LASTEXITCODE, value='$expected')"; exit 1
          }
          Write-Output "Expected version: $expected"
          $ver_out = & "dist\quirk\quirk.exe" --version
          if ($LASTEXITCODE -ne 0) { Write-Error "quirk.exe --version exited $LASTEXITCODE"; exit 1 }
          Write-Output "quirk.exe --version output: $ver_out"
          if (-not ($ver_out -match [regex]::Escape($expected))) {
            Write-Error "Version mismatch: expected '$expected', got '$ver_out'"; exit 1
          }
          & "dist\quirk\quirk.exe" --help
          if ($LASTEXITCODE -ne 0) { Write-Error "quirk.exe --help exited $LASTEXITCODE"; exit 1 }
          Write-Output "SMOKE_PASS: --version and --help both exited 0"

      - name: Upload onedir bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: quirk-windows-onedir
          path: dist/quirk
          retention-days: 30

      - name: Assemble Windows operator zip
        shell: pwsh
        run: |
          $version = python -c "from quirk import __version__; print(__version__)"
          if ($LASTEXITCODE -ne 0 -or -not $version) {
            Write-Error "Failed to read version from package (LASTEXITCODE=$LASTEXITCODE, value='$version')"; exit 1
          }
          Write-Output "Assembling quirk-windows-$version.zip ..."

          # Build a staging directory with a predictable layout so that
          # $PSScriptRoot inside install.ps1 resolves quirk\ alongside the scripts.
          #
          # Staging layout:
          #   staging\
          #     quirk\          <- onedir bundle (quirk.exe + _internal\)
          #     install.ps1
          #     uninstall.ps1
          #     sensor.sample.yaml
          $staging = "quirk-windows-staging"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging | Out-Null

          # Copy the onedir bundle (preserving quirk\ sub-directory name)
          Copy-Item -Path "dist\quirk" -Destination "$staging\quirk" -Recurse

          # Copy the PowerShell packaging scripts and sample config
          Copy-Item "packaging\windows\install.ps1"      "$staging\"
          Copy-Item "packaging\windows\uninstall.ps1"    "$staging\"
          Copy-Item "packaging\windows\sensor.sample.yaml" "$staging\"

          # Compress into a single versioned zip
          $zipName = "quirk-windows-$version.zip"
          try {
            Compress-Archive -Path "$staging\*" -DestinationPath $zipName -Force -ErrorAction Stop
          } catch {
            Write-Error "zip assembly failed: $_"; exit 1
          }
          if (-not (Test-Path $zipName)) {
            Write-Error "Compress-Archive reported success but '$zipName' was not found on disk."; exit 1
          }

          $mb = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Output "ZIP_ASSEMBLED: $zipName ($mb MB)"

      - name: Upload Windows operator zip
        uses: actions/upload-artifact@v4
        with:
          name: quirk-windows-zip
          path: quirk-windows-*.zip
          retention-days: 30

  windows-sensor-e2e:
    name: Windows Sensor E2E (frozen -> Linux-built console)
    runs-on: windows-latest
    needs: windows-sensor-build
    # No continue-on-error — this job must gate (WINBUILD-04 acceptance criterion)
    env:
      # QUIRK_DB_PATH set at job level so ALL steps in this job (console enroll,
      # uvicorn background process, and sensor push) share ONE SQLite DB file.
      # Windows Start-Process inherits the parent env by default, so the uvicorn
      # background process will also see this value without any extra wiring.
      # Use github.workspace (NOT runner.temp — the runner context is unavailable
      # in a job-level env: block and makes GitHub reject the whole workflow).
      QUIRK_DB_PATH: ${{ github.workspace }}\quirk-e2e.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install console dependencies (runner Python)
        shell: pwsh
        run: |
          # Install all extras so quirk.dashboard.api.app + uvicorn are importable
          pip install -e ".[all]"
          if ($LASTEXITCODE -ne 0) { Write-Error "pip install -e .[all] failed (exit $LASTEXITCODE)"; exit 1 }

      - name: Download frozen onedir artifact
        uses: actions/download-artifact@v4
        with:
          name: quirk-windows-onedir
          path: frozen

      - name: Verify frozen exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "frozen\quirk.exe")) {
            Write-Error "frozen\quirk.exe not found after artifact download — onedir layout unexpected"
            Get-ChildItem frozen -Recurse | Select-Object FullName
            exit 1
          }
          Write-Output "Frozen exe confirmed: frozen\quirk.exe"

      - name: Provision sensor via console enroll (runner Python)
        shell: pwsh
        run: |
          # QUIRK_DB_PATH is inherited from the job-level env block.
          # Run console enroll via run_scan.py — the `quirk` console_scripts entry
          # point is run_scan:_run_main_with_job_guard, and run_scan.py intercepts the
          # `console` subcommand (there is NO quirk/__main__.py, so `python -m quirk`
          # does not work). Routing through run_scan.py also applies its win32 UTF-8
          # stdout reconfigure, so the em-dash in the token banner won't crash on the
          # runner's cp1252 stdout. token → stdout, sensor_id → stderr.
          $stdout = & python run_scan.py console enroll --segment e2e 2>$env:RUNNER_TEMP\enroll_stderr.txt
          $stderr_content = Get-Content "$env:RUNNER_TEMP\enroll_stderr.txt" -Raw -ErrorAction SilentlyContinue

          # Parse Bearer token from stdout (line after "Bearer token (copy now...")
          $token_line = ($stdout -split "`n") | Where-Object { $_ -match '^\S' -and $_ -notmatch '^Bearer token' -and $_ -notmatch '^NOTE' } | Select-Object -First 1
          if (-not $token_line) {
            Write-Output "--- console enroll stderr (for debugging; token is on stdout, not here) ---"
            Write-Output $stderr_content
            Write-Error "Could not parse Bearer token from console enroll stdout"; exit 1
          }
          $raw_token = $token_line.Trim()

          # Parse sensor_id from stderr ("sensor_id: <uuid>")
          $sensor_id_line = ($stderr_content -split "`n") | Where-Object { $_ -match 'sensor_id:' } | Select-Object -Last 1
          if (-not $sensor_id_line) {
            Write-Error "Could not parse sensor_id from console enroll stderr"; exit 1
          }
          $sensor_id = ($sensor_id_line -replace '.*sensor_id:\s*', '').Trim()

          # Mask the token so it never appears in the job log (T-118-E2E-LEAK)
          Write-Output "::add-mask::$raw_token"

          # Persist to runner temp for use in subsequent steps
          Set-Content "$env:RUNNER_TEMP\e2e_token.txt" $raw_token
          Set-Content "$env:RUNNER_TEMP\e2e_sensor_id.txt" $sensor_id
          Write-Output "Console enroll OK — sensor_id=$sensor_id token=[masked]"

      - name: Start FastAPI console (uvicorn background, port 8512)
        shell: pwsh
        run: |
          # QUIRK_DB_PATH is inherited — the Start-Process child inherits the
          # parent process env by default on Windows, so uvicorn shares the same
          # DB without any additional -Environment or scriptblock wrapping.
          # Port 8512 chosen to avoid common conflicts.
          $proc = Start-Process python `
            -ArgumentList '-m','uvicorn','quirk.dashboard.api.app:app','--host','127.0.0.1','--port','8512' `
            -PassThru -WindowStyle Hidden
          Write-Output "uvicorn PID=$($proc.Id)"

          # Poll GET /api/health (returns HTTP 200 {"status":"ok"}) until responsive.
          # /api/health is the deterministic readiness route — it returns exactly 200
          # once the app is up; it never 404s or redirects ambiguously.
          # Using /api/sensor/push (405 Method Not Allowed) as a fallback is not
          # needed here since /api/health always returns 200 when listening.
          $timeout = 30
          $elapsed = 0
          $ready = $false
          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 1
            $elapsed++
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8512/api/health" `
                -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop
              if ($r.StatusCode -eq 200) { $ready = $true; break }
            } catch { <# not ready yet — keep polling #> }
          }
          if (-not $ready) {
            Write-Error "uvicorn did not become ready within ${timeout}s"; exit 1
          }
          Write-Output "Console ready (uvicorn responding on :8512 after ${elapsed}s)"

      - name: Frozen sensor enroll -> push auth round-trip
        shell: pwsh
        run: |
          $raw_token  = Get-Content "$env:RUNNER_TEMP\e2e_token.txt"  -Raw | ForEach-Object { $_.Trim() }
          $sensor_id  = Get-Content "$env:RUNNER_TEMP\e2e_sensor_id.txt" -Raw | ForEach-Object { $_.Trim() }
          $sensor_cfg = "$env:RUNNER_TEMP\e2e-sensor.yaml"
          $scan_cfg   = "$env:RUNNER_TEMP\e2e-scan-config.yaml"

          # Write a minimal scan config — empty targets list so the scan completes
          # instantly with zero findings; the auth wire is the subject under test.
          Set-Content $scan_cfg @"
          targets: []
          scan_options:
            tls: false
            ssh: false
            jwt: false
            containers: false
            source: false
          "@

          # Step 1: frozen sensor enroll (writes e2e-sensor.yaml with the token)
          # --allow-internal-console is REQUIRED because 127.0.0.1 is loopback/RFC1918;
          # without it the SSRF allowlist blocks the console URL (sensor_cmd.py url_allowlist).
          & "frozen\quirk.exe" sensor enroll `
            "http://127.0.0.1:8512" `
            --segment e2e `
            --sensor-id $sensor_id `
            --api-token $raw_token `
            --config $sensor_cfg `
            --allow-internal-console
          if ($LASTEXITCODE -ne 0) {
            Write-Error "frozen quirk.exe sensor enroll exited $LASTEXITCODE"; exit 1
          }
          Write-Output "Frozen sensor enroll: OK (exit 0)"

          # Step 2: frozen sensor push (exercises the full Bearer auth wire)
          # Exit code 0 = HTTP 200/409 delivered under require_sensor_auth.
          # Non-zero exits: 2=4xx reject, 3=offline, 4=other error.
          & "frozen\quirk.exe" sensor push `
            --config $sensor_cfg `
            --scan-config $scan_cfg
          if ($LASTEXITCODE -ne 0) {
            Write-Error "frozen quirk.exe sensor push exited $LASTEXITCODE — push rejected or failed"; exit 1
          }
          Write-Output "E2E_PASS: frozen sensor authenticated + push accepted"

      - name: Negative auth assertion — bogus token must be rejected (IN-02)
        shell: pwsh
        run: |
          # Prove that require_sensor_auth actually rejects unauthorized pushes.
          # Without this assertion, a middleware ordering regression (accidentally
          # disabling require_sensor_auth) would leave the E2E green on the happy
          # path while accepting ANY token.
          #
          # Strategy: copy the valid sensor config, overwrite the token with a
          # known-bogus value, run sensor push — it MUST exit non-zero (exit 2 = 4xx).
          # If it exits 0 the security guarantee is broken; fail the job.
          $sensor_cfg = "$env:RUNNER_TEMP\e2e-sensor.yaml"
          $scan_cfg   = "$env:RUNNER_TEMP\e2e-scan-config.yaml"
          $bogus_cfg  = "$env:RUNNER_TEMP\e2e-bogus.yaml"

          Copy-Item $sensor_cfg $bogus_cfg
          (Get-Content $bogus_cfg) -replace 'console_api_token:.*', 'console_api_token: "bogus-token-reject-me"' |
            Set-Content $bogus_cfg

          & "frozen\quirk.exe" sensor push --config $bogus_cfg --scan-config $scan_cfg
          if ($LASTEXITCODE -eq 0) {
            Write-Error "SECURITY: bogus token was accepted (exit 0) — require_sensor_auth may be disabled"; exit 1
          }
          Write-Output "Negative auth assertion OK: bogus token rejected (exit $LASTEXITCODE)"
