name: Dashboard Quality

on:
  pull_request:
    paths:
      - 'src/dashboard/**'
      - 'quirk/dashboard/**'
      - 'scripts/check-bundle-freshness.sh'
      - '.github/workflows/dashboard-quality.yml'
  push:
    branches: [main]

jobs:
  a11y:
    name: Axe + Console Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/dashboard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce  # v1.7.3
        with:
          chrome-version: stable

      - name: Run axe + console sweep (happy fixture)
        run: npm run a11y:check
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Run axe + console sweep (empty fixture)
        run: npm run a11y:check:empty
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

  e2e-smoke:
    name: E2E Smoke (real server + committed bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/dashboard/package-lock.json

      - name: Install project (editable, dashboard extra)
        run: pip install -e ".[dashboard]"

      - name: Install dependencies
        run: npm ci
        working-directory: src/dashboard

      - name: Run frontend unit tests
        run: npm test
        working-directory: src/dashboard

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce  # v1.7.3
        with:
          chrome-version: stable

      - name: Run E2E smoke (route walk + scan lifecycle)
        run: npm run e2e:smoke
        working-directory: src/dashboard
        env:
          E2E_PYTHON: python
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

  bundle-freshness:
    name: Bundle Freshness Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/dashboard/package-lock.json

      - name: Rebuild and diff committed bundle
        run: bash scripts/check-bundle-freshness.sh
