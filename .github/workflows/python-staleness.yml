name: Python Staleness Gate

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC

jobs:
  staleness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install project (editable) and pytest
        run: |
          pip install -e .
          pip install pytest

      - name: Run staleness gates
        run: |
          pytest \
            tests/test_qramm_staleness.py \
            tests/test_compliance_freshness.py \
            tests/test_error_codes_freshness.py \
            tests/test_cmvp_freshness.py \
            tests/test_hardware_staleness.py \
            -v

      - name: Run install-error unit checks
        run: pytest tests/test_install_errors.py -x -q -m "not slow"
