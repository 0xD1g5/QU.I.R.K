# QU.I.R.K. console — nginx reverse proxy (enterprise alternative to Caddy).
#
# TLS certificate is obtained/renewed with certbot (Let's Encrypt):
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp deploy/nginx/quirk-console.conf /etc/nginx/sites-available/quirk-console
#   sudo ln -s /etc/nginx/sites-available/quirk-console /etc/nginx/sites-enabled/
#   # edit server_name below to your DNS name, then:
#   sudo certbot --nginx -d quirk.example.com      # provisions + rewrites TLS
#   sudo nginx -t && sudo systemctl reload nginx
#
# certbot installs a systemd timer that renews automatically; verify with:
#   systemctl list-timers | grep certbot
# See docs/deployment-cloud-console.md.

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name quirk.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name quirk.example.com;

    # --- TLS: paths written by certbot (--nginx). ---
    ssl_certificate     /etc/letsencrypt/live/quirk.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quirk.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS (the console also emits this when QUIRK_HSTS=1; harmless if duplicated
    # — the console uses setdefault and will not clobber a proxy-set value).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # A little above the console's 10 MB push limit.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:8512;
        proxy_http_version 1.1;

        # Preserve the real sensor IP so the console's rate limiter + audit log
        # see it (QUIRK_TRUST_PROXY=127.0.0.1 tells uvicorn to trust this hop).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sensor pushes are short; give them headroom without hanging forever.
        proxy_read_timeout 120s;
    }
}
