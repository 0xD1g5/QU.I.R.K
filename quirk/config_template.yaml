# QU.I.R.K. Configuration File
# Generated by: quirk init
# Documentation: ./docs/configuration.md
#
# Quick start:
#   1. Edit the targets section to point at your network
#   2. Run: quirk --config config.yaml
#   3. Open the report in your output directory

# -- Assessment metadata ---------------------------------------------------
assessment:
  name: "My Organization"           # Client / organization name (appears in reports)
  report_owner: "Security Team"     # Who owns this assessment
  data_classification: "CONFIDENTIAL"  # Data classification label on all reports
  timezone: "UTC"                   # Timezone for report timestamps

# -- Scan targets ----------------------------------------------------------
# Add the IPs, CIDRs, or hostnames you want to scan.
# Remove or comment out sections that do not apply.
targets:
  include_ips:
    - "127.0.0.1"   # Replace with your target IPs

  fqdns: []
  #   - "api.example.com"
  #   - "mail.example.com"

  cidrs: []
  #   - "10.0.0.0/24"

  exclude_ips: []
  #   - "10.0.0.1"  # Skip specific IPs within a CIDR

# -- Scan configuration ----------------------------------------------------
scan:
  ports_tls: [443, 8443, 4443]    # TLS ports to probe
  timeout_seconds: 10              # Connection timeout in seconds
  concurrency: 20                  # Concurrent scan workers
  include_sni: true                # Include SNI in TLS handshake

# -- Output ----------------------------------------------------------------
output:
  directory: "./quirk-output"     # Where to write reports, CBOM, and findings JSON
  db_path: "./quirk.db"           # SQLite database path

# -- Connectors ------------------------------------------------------------
# Enable optional connectors to scan cloud KMS, JWT endpoints, containers, or source code.
connectors:
  enable_aws: false
  aws_region: "us-east-1"
  aws_profile: "default"
  enable_azure: false
  azure_subscription_id: ""
  azure_keyvault_urls: []
  enable_jwt: false
  jwt_targets: []
  enable_container: false
  container_targets: []
  enable_source: false
  source_targets: []

# -- Intelligence / scoring profile -----------------------------------------
# Adjust how the quantum-readiness score weights agility and identity signals.
# intelligence:
#   profile: balanced        # strict | balanced | lenient
#                            #   strict  — 1.4x agility + identity weights (conservative posture)
#                            #   balanced — default (1.0x multipliers)
#                            #   lenient  — 0.7x agility + identity weights (relaxed posture)
#   # calibration_overrides: # Fine-tune individual weight keys (advanced)
#   #   agility_high_impact_ratio: 14.0
