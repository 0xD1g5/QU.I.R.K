# QU.I.R.K. Configuration File
# Generated by: quirk init
# Documentation: ./docs/configuration.md
#
# Quick start:
#   1. Edit the targets section to point at your network
#   2. Run: quirk --config config.yaml
#   3. Open the report in your output directory

# -- Assessment metadata ---------------------------------------------------
assessment:
  name: "My Organization"           # Client / organization name (appears in reports)
  report_owner: "Security Team"     # Who owns this assessment
  data_classification: "CONFIDENTIAL"  # Data classification label on all reports
  timezone: "UTC"                   # Timezone for report timestamps

# -- Scan targets ----------------------------------------------------------
# Add the IPs, CIDRs, or hostnames you want to scan.
# Remove or comment out sections that do not apply.
targets:
  include_ips:
    - "127.0.0.1"   # Replace with your target IPs

  fqdns: []
  #   - "api.example.com"
  #   - "mail.example.com"

  cidrs: []
  #   - "10.0.0.0/24"

  exclude_ips: []
  #   - "10.0.0.1"  # Skip specific IPs within a CIDR

# -- Scan configuration ----------------------------------------------------
scan:
  ports_tls: [443, 8443, 4443]    # TLS ports to probe
  timeout_seconds: 10              # Connection timeout in seconds
  concurrency: 20                  # Concurrent scan workers
  include_sni: true                # Include SNI in TLS handshake

# -- Output ----------------------------------------------------------------
output:
  directory: "./quirk-output"     # Where to write reports, CBOM, and findings JSON
  db_path: "./quirk.db"           # SQLite database path

# -- Connectors ------------------------------------------------------------
# Enable optional connectors to scan cloud KMS, JWT endpoints, containers, or source code.
connectors:
  enable_aws: false
  aws_region: "us-east-1"
  aws_profile: "default"
  enable_azure: false
  azure_subscription_id: ""
  azure_keyvault_urls: []
  enable_jwt: false
  jwt_targets: []
  enable_container: false
  container_targets: []
  enable_source: false
  source_targets: []
  # -- Identity connectors (optional, requires: pip install quirk[identity]) --
  # enable_kerberos: false
  # kerberos_targets:
  #   - "kdc.example.com"       # KDC hostname or IP (port 88, TCP with UDP fallback)
  # enable_saml: false
  # saml_targets:
  #   - "https://idp.example.com/metadata.xml"  # SAML IdP metadata URL
  # enable_dnssec: false
  # dnssec_targets:
  #   - "example.com"           # Domain name for DNSKEY / DS record queries
  # -- GCP connector (optional, requires: pip install quirk[cloud]) --
  # enable_gcp: false
  # gcp_project_id: "my-gcp-project"
  # -- Database connector (optional, requires: pip install quirk[db]) --
  # enable_db: false
  # pg_targets:
  #   - "localhost:5432"       # host:port of PostgreSQL instance
  # pg_scanner_user: "quirk_scanner"
  # pg_scanner_password: ""
  # mysql_targets:
  #   - "localhost:3306"       # host:port of MySQL/MariaDB instance
  # mysql_scanner_user: "quirk_scanner"
  # mysql_scanner_password: ""
  # -- Object storage connectors (optional, requires: pip install quirk[cloud]) --
  # enable_s3: false
  # aws_endpoint_url: null            # override for MinIO/LocalStack testing
  # enable_blob: false
  # -- Kubernetes secrets inspection (optional, requires: pip install quirk[cloud]) --
  # enable_k8s: false
  # k8s_provider: ""              # "eks" | "gke" | "aks"
  # k8s_cluster_name: ""          # name of the managed cluster (single)
  # k8s_namespace: "default"      # namespace for secret type enumeration (K8S-02)
  # k8s_kubeconfig: ""            # path to kubeconfig (defaults to ~/.kube/config)
  # k8s_context: ""               # kubeconfig context (optional)
  # gke_clusters: []              # [{name: my-gke, location: us-central1}]
  # aks_clusters: []              # [{name: my-aks, resource_group: rg}]

# -- Intelligence / scoring profile -----------------------------------------
# Adjust how the quantum-readiness score weights agility and identity signals.
# intelligence:
#   profile: balanced        # strict | balanced | lenient
#                            #   strict  — 1.4x agility + identity weights (conservative posture)
#                            #   balanced — default (1.0x multipliers)
#                            #   lenient  — 0.7x agility + identity weights (relaxed posture)
#   # calibration_overrides: # Fine-tune individual weight keys (advanced)
#   #   agility_high_impact_ratio: 14.0
