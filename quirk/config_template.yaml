# QU.I.R.K. Configuration File
# Generated by: quirk init
# Documentation: https://github.com/[owner]/quirk/blob/main/docs/configuration.md
#
# Quick start:
#   1. Edit the targets section to point at your network
#   2. Run: quirk scan --config config.yaml
#   3. Open the report in your output directory

# -- Assessment metadata ---------------------------------------------------
assessment:
  name: "My Organization"           # Client / organization name (appears in reports)
  report_owner: "Security Team"     # Who owns this assessment
  data_classification: "CONFIDENTIAL"  # Data classification label on all reports
  timezone: "UTC"                   # Timezone for report timestamps

# -- Scan targets ----------------------------------------------------------
# Add the IPs, CIDRs, or hostnames you want to scan.
# Remove or comment out sections that do not apply.
targets:
  ips:
    - "127.0.0.1"   # Replace with your target IPs

  # fqdns:
  #   - "api.example.com"
  #   - "mail.example.com"

  # cidrs:
  #   - "10.0.0.0/24"

  # exclude_ips:
  #   - "10.0.0.1"  # Skip specific IPs within a CIDR

# -- Scan configuration ----------------------------------------------------
scan:
  ports_tls: [443, 8443, 4443]    # TLS ports to probe
  ports_ssh: [22, 2222]           # SSH ports to probe
  timeout: 10                      # Connection timeout in seconds
  max_workers: 20                  # Concurrent scan workers

# -- Output ----------------------------------------------------------------
output:
  directory: "./quirk-output"     # Where to write reports, CBOM, and findings JSON
  db_path: "./quirk.db"           # SQLite database path

# -- Optional: JWT / API scanning -----------------------------------------
# Uncomment to enable JWT endpoint scanning.
# connectors:
#   jwt_endpoints:
#     - url: "https://api.example.com/.well-known/jwks.json"
#       name: "Production API"

# -- Optional: AWS scanning -----------------------------------------------
# Requires AWS credentials (see docs/connectors/aws.md)
# connectors:
#   aws:
#     enabled: false
#     region: "us-east-1"
#     profile: "default"

# -- Optional: Azure scanning ---------------------------------------------
# Requires Azure credentials (see docs/connectors/azure.md)
# connectors:
