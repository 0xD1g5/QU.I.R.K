[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "quirk"
version = "4.1.0"
description = "QU.I.R.K. -- Quantum Infrastructure Readiness Kit"
requires-python = ">=3.10"
license = {text = "Proprietary"}
dependencies = [
    "PyYAML>=6.0",
    "cryptography>=44.0",
    "SQLAlchemy>=2.0",
    "tqdm>=4.67",
    "cyclonedx-python-lib>=11.7.0,<12",
    "httpx>=0.28.0",
    "jinja2>=3.1.0",
    "rich>=13.0.0",
    "PyJWT>=2.12.0",
    "python-jose>=3.5.0",
    "boto3>=1.42.0",
    "azure-identity>=1.25.0",
    "azure-keyvault-certificates>=4.10.0",
    "azure-keyvault-keys>=4.11.0",
    "azure-mgmt-network>=30.2.0",
]

[project.optional-dependencies]
dashboard = [
    "fastapi>=0.128.8",
    "uvicorn[standard]>=0.39.0",
    "python-multipart>=0.0.20",
    "playwright>=1.58.0",
]

[project.scripts]
quirk = "run_scan:main"

[tool.setuptools.packages.find]
include = ["quirk*"]

[tool.setuptools]
py-modules = ["run_scan"]

[tool.setuptools.package-data]
quirk = ["reports/templates/*.j2", "config_template.yaml", "dashboard/static/**/*"]
