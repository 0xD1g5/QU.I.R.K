<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"></head><body>
<div style="background:#0d0f14;border:1px solid #252d3e;border-radius:10px;overflow:hidden">
<table style="width:100%;border-collapse:collapse;font-size:12px;font-family:var(--ds-font-body)">
  <thead><tr>
    <th style="text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.08em;font-weight:500;text-transform:uppercase;color:#6e7a95;border-bottom:1px solid #252d3e">CVE</th>
    <th style="text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.08em;font-weight:500;text-transform:uppercase;color:#6e7a95;border-bottom:1px solid #252d3e">Severity</th>
    <th style="text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.08em;font-weight:500;text-transform:uppercase;color:#6e7a95;border-bottom:1px solid #252d3e">Hosts</th>
    <th style="text-align:right;padding:8px 12px;font-size:10px;letter-spacing:.08em;font-weight:500;text-transform:uppercase;color:#6e7a95;border-bottom:1px solid #252d3e">CVSS</th>
    <th style="text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.08em;font-weight:500;text-transform:uppercase;color:#6e7a95;border-bottom:1px solid #252d3e">Status</th>
  </tr></thead>
  <tbody>
    <tr><td style="padding:9px 12px;border-bottom:1px solid #252d3e;font-family:var(--ds-font-mono);font-size:11px">CVE-2024-3400</td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e"><span class="badge badge--critical"><span class="dot"></span>critical</span></td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e">12</td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e;text-align:right;font-family:var(--ds-font-mono);color:#e05555;font-weight:700">10.0</td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e"><span class="badge badge--medium">open</span></td></tr>
    <tr><td style="padding:9px 12px;border-bottom:1px solid #252d3e;font-family:var(--ds-font-mono);font-size:11px">CVE-2024-1086</td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e"><span class="badge badge--high"><span class="dot"></span>high</span></td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e">6</td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e;text-align:right;font-family:var(--ds-font-mono);color:#d4893a;font-weight:700">8.7</td>
        <td style="padding:9px 12px;border-bottom:1px solid #252d3e"><span class="badge badge--info">in review</span></td></tr>
    <tr><td style="padding:9px 12px;font-family:var(--ds-font-mono);font-size:11px;color:#6e7a95">CVE-2023-44487</td>
        <td style="padding:9px 12px"><span class="badge badge--medium"><span class="dot"></span>medium</span></td>
        <td style="padding:9px 12px;color:#6e7a95">31</td>
        <td style="padding:9px 12px;text-align:right;font-family:var(--ds-font-mono);color:#6e7a95">5.4</td>
        <td style="padding:9px 12px"><span class="badge badge--ok">patched</span></td></tr>
  </tbody>
</table>
</div>
</body></html>
