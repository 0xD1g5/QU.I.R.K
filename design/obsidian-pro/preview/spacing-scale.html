<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <span class="label">Spacing · 8px grid</span>
  <div style="display:flex;flex-direction:column;gap:5px">
    <div style="display:flex;align-items:center;gap:12px"><div style="width:4px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s1 · 4px</span></div>
    <div style="display:flex;align-items:center;gap:12px"><div style="width:8px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s2 · 8px</span></div>
    <div style="display:flex;align-items:center;gap:12px"><div style="width:12px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s3 · 12px</span></div>
    <div style="display:flex;align-items:center;gap:12px"><div style="width:16px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s4 · 16px · default card padding</span></div>
    <div style="display:flex;align-items:center;gap:12px"><div style="width:20px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s5 · 20px</span></div>
    <div style="display:flex;align-items:center;gap:12px"><div style="width:24px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s6 · 24px · section</span></div>
    <div style="display:flex;align-items:center;gap:12px"><div style="width:32px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s8 · 32px · main padding</span></div>
    <div style="display:flex;align-items:center;gap:12px"><div style="width:40px;height:8px;background:rgba(102,117,247,.25);border:1px solid rgba(102,117,247,.4)"></div><span style="font-size:11px;color:#6e7a95;font-family:var(--ds-font-mono)">--ds-s10 · 40px · between sections</span></div>
  </div>
</div>
</body></html>
