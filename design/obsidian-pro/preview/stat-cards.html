<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"></head><body>
<div class="card">
  <span class="label">Stat cards · standard + critical variant</span>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
    <div style="background:#161921;border:1px solid #252d3e;border-radius:6px;padding:12px">
      <p class="label" style="margin-bottom:4px">Coverage</p>
      <p style="font-size:30px;font-weight:700;color:#4ba8a8;font-family:var(--ds-font-mono);line-height:1">98.2<span style="font-size:14px;font-weight:400">%</span></p>
      <p style="font-size:10px;color:#3fa876;margin-top:4px">↑ 0.4%</p>
    </div>
    <div style="background:#161921;border:1px solid #252d3e;border-radius:6px;padding:12px">
      <p class="label" style="margin-bottom:4px">Detections</p>
      <p style="font-size:30px;font-weight:700;color:#f0f2f8;font-family:var(--ds-font-mono);line-height:1">247</p>
      <p style="font-size:10px;color:#d4893a;margin-top:4px">↓ 12%</p>
    </div>
    <div style="background:#161921;border:1px solid #252d3e;border-radius:6px;padding:12px">
      <p class="label" style="margin-bottom:4px">MTTR</p>
      <p style="font-size:30px;font-weight:700;color:#f0f2f8;font-family:var(--ds-font-mono);line-height:1">4.2<span style="font-size:14px;font-weight:400">h</span></p>
      <p style="font-size:10px;color:#3fa876;margin-top:4px">↓ 18min</p>
    </div>
    <div style="background:rgba(224,85,85,.10);border:1px solid rgba(224,85,85,.28);border-radius:6px;padding:12px">
      <p class="label" style="color:#e05555;margin-bottom:4px">Critical</p>
      <p style="font-size:30px;font-weight:700;color:#e05555;font-family:var(--ds-font-mono);line-height:1">3</p>
      <p style="font-size:10px;color:#e05555;margin-top:4px">needs action</p>
    </div>
  </div>
</div>
</body></html>
