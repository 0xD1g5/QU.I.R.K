<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"></head><body>
<div class="card" style="gap:0">
  <div style="display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid rgba(37,45,62,.45)"><span style="font-size:10px;color:#4a5568;font-family:var(--ds-font-mono);min-width:160px">label / 10px / .08em</span><span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#6e7a95">All-caps eyebrow label</span></div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid rgba(37,45,62,.45)"><span style="font-size:10px;color:#4a5568;font-family:var(--ds-font-mono);min-width:160px">ui / 12px</span><span style="font-size:12px">Table cell · chip · button</span></div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid rgba(37,45,62,.45)"><span style="font-size:10px;color:#4a5568;font-family:var(--ds-font-mono);min-width:160px">body / 13px</span><span style="font-size:13px">Body text and descriptions</span></div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid rgba(37,45,62,.45)"><span style="font-size:10px;color:#4a5568;font-family:var(--ds-font-mono);min-width:160px">h3 / 15px / 600</span><span style="font-size:15px;font-weight:600">Card title</span></div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid rgba(37,45,62,.45)"><span style="font-size:10px;color:#4a5568;font-family:var(--ds-font-mono);min-width:160px">h2 / 18px / 600</span><span style="font-size:18px;font-weight:600">Section title</span></div>
  <div style="display:flex;align-items:baseline;gap:16px;padding:8px 0"><span style="font-size:10px;color:#4a5568;font-family:var(--ds-font-mono);min-width:160px">h1 / 22px / 700</span><span style="font-size:22px;font-weight:700">Page title</span></div>
</div>
</body></html>
