<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <span class="label">Text colors · v1.2 lightened for dark-bg readability</span>
  <div class="swatch-row">
    <div class="swatch"><div class="swatch-box" style="background:#f0f2f8"></div><span class="swatch-name">--ds-text</span><span class="swatch-hex">#f0f2f8</span></div>
    <div class="swatch"><div class="swatch-box" style="background:#9aa3ba"></div><span class="swatch-name">--ds-text-muted</span><span class="swatch-hex">#9aa3ba</span></div>
    <div class="swatch"><div class="swatch-box" style="background: rgb(164, 182, 222)"></div><span class="swatch-name">--ds-text-faint</span><span class="swatch-hex">#707b94</span></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
    <span style="font-size:13px;color:#f0f2f8">Primary — body and headings, full opacity</span>
    <span style="font-size:13px;color:#9aa3ba;font-weight:500">Muted — labels, secondary, table dim cells</span>
    <span style="font-size:13px;color:#707b94">Faint — placeholder, disabled, helper text</span>
  </div>
</div>
</body></html>
