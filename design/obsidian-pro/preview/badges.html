<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <span class="label">Severity badges · with status dot</span>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="badge badge--critical"><span class="dot"></span>critical</span>
    <span class="badge badge--high"><span class="dot"></span>high</span>
    <span class="badge badge--ok"><span class="dot"></span>ok</span>
    <span class="badge badge--medium"><span class="dot"></span>medium</span>
    <span class="badge badge--info"><span class="dot"></span>info</span>
    <span class="badge badge--accent">● live</span>
  </div>
  <span class="label" style="margin-top:8px">Text-only · for cells and tags</span>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="badge badge--critical">critical</span>
    <span class="badge badge--high">high</span>
    <span class="badge badge--ok">resolved</span>
    <span class="badge badge--medium">open</span>
    <span class="badge badge--info">in review</span>
  </div>
</div>
</body></html>
