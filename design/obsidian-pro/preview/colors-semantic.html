<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <span class="label">Semantic · severity only, never decorative</span>
  <div class="swatch-row">
    <div class="swatch"><div class="swatch-box" style="background:#4ba8a8"></div><span class="swatch-name">--ds-accent</span><span class="swatch-hex">#4ba8a8</span></div>
    <div class="swatch"><div class="swatch-box" style="background:#e05555"></div><span class="swatch-name">--ds-critical</span><span class="swatch-hex">#e05555</span></div>
    <div class="swatch"><div class="swatch-box" style="background:#d4893a"></div><span class="swatch-name">--ds-high</span><span class="swatch-hex">#d4893a</span></div>
    <div class="swatch"><div class="swatch-box" style="background:#3fa876"></div><span class="swatch-name">--ds-ok</span><span class="swatch-hex">#3fa876</span></div>
    <div class="swatch"><div class="swatch-box" style="background:#8892a4"></div><span class="swatch-name">--ds-medium</span><span class="swatch-hex">#8892a4</span></div>
  </div>
</div>
</body></html>
