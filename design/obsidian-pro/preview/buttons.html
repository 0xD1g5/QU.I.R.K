<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <span class="label">Buttons · variants</span>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button class="btn btn--primary">Investigate</button>
    <button class="btn btn--secondary">Assign</button>
    <button class="btn btn--danger">Quarantine</button>
    <button class="btn btn--ghost">Dismiss</button>
    <button class="btn btn--secondary" disabled style="opacity:.4">Disabled</button>
  </div>
  <span class="label" style="margin-top:8px">Sizes</span>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button class="btn btn--primary btn--sm">Small</button>
    <button class="btn btn--primary">Medium</button>
    <button class="btn btn--primary btn--lg">Large</button>
  </div>
</div>
</body></html>
