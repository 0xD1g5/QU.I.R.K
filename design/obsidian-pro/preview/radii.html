<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <span class="label">Corner radii</span>
  <div style="display:flex;gap:20px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:60px;height:60px;border-radius:4px;background:#161921;border:1px solid #252d3e"></div><span style="font-size:10px;color:#6e7a95;font-family:var(--ds-font-mono)">sm · 4</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:60px;height:60px;border-radius:6px;background:#161921;border:1px solid #252d3e"></div><span style="font-size:10px;color:#6e7a95;font-family:var(--ds-font-mono)">md · 6 · btn</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:60px;height:60px;border-radius:10px;background:#161921;border:1px solid #252d3e"></div><span style="font-size:10px;color:#6e7a95;font-family:var(--ds-font-mono)">lg · 10 · card</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:60px;height:60px;border-radius:14px;background:#161921;border:1px solid #252d3e"></div><span style="font-size:10px;color:#6e7a95;font-family:var(--ds-font-mono)">xl · 14</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:90px;height:30px;border-radius:100px;background:#161921;border:1px solid #252d3e"></div><span style="font-size:10px;color:#6e7a95;font-family:var(--ds-font-mono)">pill · 100 · badge</span></div>
  </div>
</div>
</body></html>
