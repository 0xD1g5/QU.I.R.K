<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 48 48" fill="none">
  <!-- Dark background -->
  <rect width="48" height="48" rx="8" fill="#0a0a0f"/>
  <!-- Electric-blue border accent -->
  <rect width="48" height="48" rx="8" fill="none" stroke="#3b9dff" stroke-width="2"/>
  <!-- "Q" monogram in electric blue -->
  <text
    x="24" y="34"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    font-weight="900"
    fill="#3b9dff"
    text-anchor="middle"
    letter-spacing="0"
  >Q</text>
  <!-- Accent dot — bottom-right corner mark -->
  <circle cx="36" cy="36" r="4" fill="#3b9dff" opacity="0.7"/>
</svg>
