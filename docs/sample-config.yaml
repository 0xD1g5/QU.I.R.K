assessment:
  name: "Scorecard Sample Run"
  data_classification: "internal"
  report_owner: "Security Team"
  timezone: "America/New_York"

scan:
  timeout_seconds: 1
  concurrency: 20
  ports_tls: [22, 443, 8443]
  include_sni: false
  tls_enum_mode: fast
  fingerprint_timeout_seconds: 1
  fingerprint_concurrency: 20
  tls_timeout_seconds: 1
  tls_concurrency: 10
  ssh_timeout_seconds: 1
  ssh_concurrency: 10

targets:
  fqdns: []
  cidrs: []
  include_ips: ["127.0.0.1"]
  exclude_ips: []

connectors:
  enable_aws: false
  enable_azure: false
  enable_windows_adcs: false

output:
  directory: "tmp/sample_output"
  db_path: "tmp/sample_output/sample.sqlite"

# Jira Ticketing — Phase 104 (v5.3+)
# Create one Jira issue per finding with SHA-256 fingerprint dedup.
# Requires: pip install "quirk-scanner[tickets]"
#           QUIRK_CONFIG_PATH env var pointing to this file
#           QUIRK_DB_PATH for audit rows
#           QUIRK_JIRA_USER  — set to your Jira email (cloud) or username (server)
#           QUIRK_JIRA_TOKEN — set to your Jira API token (cloud) or PAT (server)
# SECURITY: store env var NAMES here only — never credential values.
#
# ticketing:
#   jira:
#     jira_url: https://acme.atlassian.net    # required: Jira base URL
#     jira_user_env: QUIRK_JIRA_USER          # env var NAME holding email/username
#     jira_token_env: QUIRK_JIRA_TOKEN        # env var NAME holding API token or PAT
#     project_key: SEC                         # required: Jira project key
#     issue_type: Bug                          # optional: default Bug
#     auth_mode: cloud                         # cloud (default) or server (PAT)
#     allow_internal: false                    # set true for self-hosted Jira on RFC1918
#
# ServiceNow Ticketing (v5.3+ / Phase 105) — use with: quirk ticket create --backend servicenow
# Requires: QUIRK_CONFIG_PATH env var pointing to this file; QUIRK_DB_PATH for audit rows.
#           QUIRK_SNOW_USER  — set to your ServiceNow username
#           QUIRK_SNOW_PASSWORD — set to your ServiceNow password
# SECURITY: store env var NAMES here only — never credential values.
#           instance_url MUST be https://; http:// is rejected at parse time (SSRF guard).
#
#   servicenow:
#     instance_url: https://acme.service-now.com  # required: MUST be https://
#     user_env: QUIRK_SNOW_USER                   # env var NAME holding your username
#     password_env: QUIRK_SNOW_PASSWORD           # env var NAME holding your password
#     table: incident                             # optional: default incident
#     allow_internal: false                       # set true for self-hosted on RFC1918

# SIEM Export (syslog/CEF) — Phase 103 (v5.3+)
# Deliver one CEF:0 event per finding to a syslog collector after each scheduled scan.
# Requires: QUIRK_CONFIG_PATH env var pointing to this file; QUIRK_DB_PATH for the audit row.
# TCP framing note: raw TCP only (no octet-count, no TLS). Configure receiver for LF-terminated
#   or raw-bytes syslog input. TLS-wrapped syslog is deferred to a future release.
#
# siem:
#   host: siem.corp.example.com   # required: hostname or IP of your syslog/CEF collector
#   port: 514                     # optional: collector port (default 514)
#   protocol: udp                 # optional: udp (default) or tcp
#   export_after_scan: false      # optional: set true to export automatically after scheduled scans
#   timeout_seconds: 5            # optional: socket send timeout in seconds
